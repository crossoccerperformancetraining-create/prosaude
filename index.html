            const handleLogoFile = async (e) => { const f=e.target.files[0]; if(f) { try{const c=await compressImage(f,200,0.6); setLogo(c); showToast("Atualizado!");}catch(e){} } };
            const handleRestore = (e) => { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=(e)=>{try{const d=JSON.parse(e.target.result); onImport(d); showToast("Dados Restaurados!"); setTimeout(() => window.location.reload(), 1000);}catch(e){showToast("Erro no arquivo")}}; r.readAsText(f); };
            return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in"><div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative"><div className="p-4 border-b dark:border-slate-700 flex justify-between items-center" style={{backgroundColor:themeColor}}><h2 className="text-white font-bold flex items-center gap-2"><Icon name="settings"/> CONFIG & BACKUP</h2><button onClick={onClose} className="text-white hover:bg-white/20 p-1 rounded"><Icon name="x"/></button></div><div className="p-6 space-y-6 max-h-[80vh] overflow-y-auto"><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Identidade</h3><div className="flex items-center gap-4"><div className="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-700 border-2 flex items-center justify-center relative group cursor-pointer overflow-hidden" style={{borderColor:themeColor}}>{logo?<img src={logo} className="w-full h-full object-contain"/>:<Icon name="image" className="text-slate-300 dark:text-slate-500" size={30}/>}<input type="file" ref={fileInputRef} className="hidden" onChange={handleLogoFile}/><div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100" onClick={()=>fileInputRef.current.click()}><Icon name="folder" className="text-white"/></div></div><div className="flex-1"><label className="text-[10px] font-bold text-slate-500 dark:text-slate-400">NOME</label><BufferedInput className="w-full border-b-2 border-slate-200 dark:border-slate-600 py-1 font-bold text-lg outline-none bg-transparent dark:text-white" value={header.teamName || ''} onSave={val=>setHeader({...header, teamName:val})}/><BufferedInput className="w-full text-xs mt-1 border-b border-slate-100 dark:border-slate-700 p-1 bg-transparent dark:text-slate-300" placeholder="Ou cole URL da logo..." value={logo && logo.startsWith('http')?logo:''} onSave={val=>setLogo(val)}/></div></div></div><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Tema</h3><input type="color" value={themeColor} onChange={e=>setThemeColor(e.target.value)} className="w-12 h-12 rounded-lg border-2 cursor-pointer dark:border-slate-600"/></div><div className="border-t dark:border-slate-700 pt-4"><div className="grid grid-cols-2 gap-2 mb-2"><button onClick={onExport} className="flex justify-center gap-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 py-2 rounded font-bold text-xs"><Icon name="share" size={14}/> EXPORTAR TUDO</button><button onClick={()=>importInputRef.current.click()} className="flex justify-center gap-2 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800 py-2 rounded font-bold text-xs"><Icon name="upload" size={14}/> IMPORTAR DADOS</button><input type="file" ref={importInputRef} className="hidden" accept=".json" onChange={handleRestore}/></div><p className="text-[10px] text-slate-400 text-center mb-2">Use exportar para salvar uma cópia local por segurança.</p></div></div></div></div>);
        };

        const WellnessDashboard = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [mode, setMode] = useState('dashboard');
            const [wellnessDate, setWellnessDate] = useState(getTodayStr()); 
            
            // Variáveis para o Modo Manual
            const [selectedPlayer, setSelectedPlayer] = useState(0);
            const [localScores, setLocalScores] = useState({sleep:4,stress:4,fatigue:4,soreness:4, mood: 4}); 
            const [localPainZones, setLocalPainZones] = useState([]);
            const bodyParts = ["Cabeça", "Pescoço", "Trapézio", "Ombro", "Peitoral", "Costas Sup.", "Lombar", "Abdômen", "Braço", "Quadril", "Adutor", "Quadríceps", "Posterior Coxa", "Joelho", "Panturrilha", "Tornozelo", "Pé"];

            useEffect(() => { 
                if(mode === 'manual') {
                    const log = trainingLog[wellnessDate]?.[selectedPlayer] || {}; 
                    setLocalScores(log.wellness || {sleep:4,stress:4,fatigue:4,soreness:4, mood: 4}); 
                    setLocalPainZones(log.painZones || []); 
                }
            }, [wellnessDate, selectedPlayer, trainingLog, mode]);

            const handleScoreChange = (metric, val) => { setLocalScores(prev => ({...prev, [metric]: parseInt(val)})); };
            const togglePainZone = (zone) => { let n = [...localPainZones]; if(n.includes(zone)) n = n.filter(z=>z!==zone); else n.push(zone); setLocalPainZones(n); };
            
            const confirmData = () => { 
                const newLog = {...trainingLog}; 
                if(!newLog[wellnessDate]) newLog[wellnessDate] = {}; 
                if(!newLog[wellnessDate][selectedPlayer]) newLog[wellnessDate][selectedPlayer] = {}; 
                newLog[wellnessDate][selectedPlayer].wellness = localScores; 
                newLog[wellnessDate][selectedPlayer].painZones = localPainZones; 
                setTrainingLog(newLog); 
                showToast("Dados Salvos!"); 
                setMode('dashboard');
            };

            // MODO DASHBOARD (Novo visual inteligente)
            if (mode === 'dashboard') {
                const safePlayers = Array.isArray(players) ? players : [];
                const filledCount = safePlayers.filter((p,i) => trainingLog[wellnessDate]?.[i]?.wellness).length;
                const totalCount = safePlayers.length;
                
                return (
                    <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col gap-6">
                        <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
                            <div>
                                <h2 className="text-lg font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="smile"/> PAINEL WELLNESS</h2>
                                <p className="text-[10px] text-slate-500 uppercase mt-1 font-bold">{filledCount} de {totalCount} atletas responderam</p>
                            </div>
                            <div className="flex gap-2">
                                <input type="date" value={wellnessDate} onChange={e=>setWellnessDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold text-xs rounded px-2 py-1 outline-none border border-slate-200 dark:border-slate-600 cursor-pointer"/>
                                <button onClick={()=>setMode('manual')} className="bg-slate-800 dark:bg-slate-700 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold shadow flex items-center gap-1 hover:opacity-90"><Icon name="edit" size={12}/> AJUSTE MANUAL</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {safePlayers.map((p, i) => {
                                const log = trainingLog[wellnessDate]?.[i]?.wellness;
                                const pain = trainingLog[wellnessDate]?.[i]?.painZones || [];
                                const isFilled = !!log;
                                return (
                                    <div key={i} className={`bg-white dark:bg-slate-800 rounded-xl shadow p-4 border ${isFilled ? 'border-l-4 border-l-green-500' : 'border-slate-200 dark:border-slate-700 opacity-70'}`}>
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="flex items-center gap-2">
                                                <div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden shrink-0 border border-slate-200">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user" size={20} className="m-2 text-slate-400"/>}</div>
                                                <span className="font-bold text-sm text-slate-800 dark:text-slate-100 truncate w-32">{p.name}</span>
                                            </div>
                                            {isFilled ? <span className="bg-green-100 text-green-700 text-[9px] font-black px-2 py-1 rounded-full uppercase">Recebido</span> : <span className="bg-slate-100 dark:bg-slate-700 text-slate-500 text-[9px] font-black px-2 py-1 rounded-full uppercase flex items-center gap-1"><Icon name="calendar" size={10}/> Pendente</span>}
                                        </div>
                                        
                                        {isFilled ? (
                                            <div className="space-y-2.5">
                                                <div className="flex justify-between text-[10px] uppercase font-bold items-center"><span className="text-slate-500 w-16">Sono</span><div className="flex gap-2 items-center flex-1"><div className="flex-1 h-1.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-blue-500" style={{width:`${(log.sleep/7)*100}%`}}></div></div><span className="w-3 text-right dark:text-slate-300">{log.sleep}</span></div></div>
                                                <div className="flex justify-between text-[10px] uppercase font-bold items-center"><span className="text-slate-500 w-16">Estresse</span><div className="flex gap-2 items-center flex-1"><div className="flex-1 h-1.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-purple-500" style={{width:`${(log.stress/7)*100}%`}}></div></div><span className="w-3 text-right dark:text-slate-300">{log.stress}</span></div></div>
                                                <div className="flex justify-between text-[10px] uppercase font-bold items-center"><span className="text-slate-500 w-16">Fadiga</span><div className="flex gap-2 items-center flex-1"><div className="flex-1 h-1.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-green-500" style={{width:`${(log.fatigue/7)*100}%`}}></div></div><span className="w-3 text-right dark:text-slate-300">{log.fatigue}</span></div></div>
                                                <div className="flex justify-between text-[10px] uppercase font-bold items-center"><span className="text-slate-500 w-16">Dor</span><div className="flex gap-2 items-center flex-1"><div className="flex-1 h-1.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-orange-500" style={{width:`${(log.soreness/7)*100}%`}}></div></div><span className="w-3 text-right dark:text-slate-300">{log.soreness}</span></div></div>
                                                {pain.length > 0 && <div className="mt-3 bg-red-50 dark:bg-red-900/30 border border-red-100 dark:border-red-800 p-2 rounded text-[9px] font-bold text-red-600 dark:text-red-400 uppercase leading-tight"><Icon name="alert" size={12} className="inline mr-1 -mt-0.5"/> Dores: {pain.join(', ')}</div>}
                                            </div>
                                        ) : (
                                            <div className="h-[120px] flex flex-col items-center justify-center border-2 border-dashed border-slate-100 dark:border-slate-700 rounded-lg">
                                                <Icon name="activity" size={24} className="text-slate-200 dark:text-slate-600 mb-2" />
                                                <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase">Sem dados de hoje</span>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            // MODO MANUAL (Antigo)
            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto flex flex-col gap-6 animate-fade-in">
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex justify-between items-center gap-4">
                        <h2 className="text-lg font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="edit"/> MODO MANUAL</h2>
                        <button onClick={()=>setMode('dashboard')} className="bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 hover:bg-slate-300"><Icon name="x" size={14}/> VOLTAR AO PAINEL</button>
                    </div>
                    <div className="flex flex-col md:flex-row gap-6 flex-1">
                        <div className="w-full md:w-1/3 bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-200 dark:border-slate-700 flex flex-col"><h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-4">Selecionar Atleta</h3><div className="space-y-2 flex-1 overflow-y-auto pr-2">{(Array.isArray(players)?players:[]).map((p, i) => (<div key={i} onClick={()=>setSelectedPlayer(i)} className={`flex items-center gap-2 p-2 rounded cursor-pointer border group transition-colors ${selectedPlayer===i?'border-l-4 shadow-sm':'border-transparent hover:bg-slate-50 dark:hover:bg-slate-700'}`} style={{borderLeftColor: selectedPlayer===i?themeColor:'transparent'}}><div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden relative shrink-0 border border-slate-200 dark:border-slate-600">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div><div className="font-bold text-sm text-slate-700 dark:text-slate-200">{p.name}</div></div>))}</div></div>
                        <div className="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow p-6 border border-slate-200 dark:border-slate-700 flex flex-col gap-4 overflow-y-auto relative">
                            <div className="flex justify-between items-center border-b dark:border-slate-700 pb-4"><div><h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100">{players[selectedPlayer]?.name}</h2></div></div>
                            <div className="space-y-4">{[{id:'sleep',label:'Qualidade do Sono (1-7)'},{id:'stress',label:'Estresse (1-7)'},{id:'fatigue',label:'Fadiga (1-7)'},{id:'soreness',label:'Dor Muscular (1-7)'}, {id:'mood', label:'Humor (1-7)'}].map(m=>(<div key={m.id}><div className="flex justify-between text-sm font-bold text-slate-700 dark:text-slate-300 mb-2"><span>{m.label}</span><span className="text-white px-2 rounded font-bold" style={{backgroundColor: themeColor}}>{localScores[m.id]}</span></div><input type="range" min="1" max="7" step="1" value={localScores[m.id]} onChange={(e)=>handleScoreChange(m.id, e.target.value)} className="hooper-slider" style={{accentColor: themeColor}}/></div>))}</div>
                            <div className="border-t dark:border-slate-700 pt-4"><h4 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Local da Dor</h4><select className="w-full p-2 border dark:border-slate-600 rounded text-xs mb-2 bg-white dark:bg-slate-700 dark:text-white" onChange={(e)=>{if(e.target.value) togglePainZone(e.target.value); e.target.value='';}}><option value="">+ Adicionar Local</option>{bodyParts.map(p=><option key={p} value={p}>{p}</option>)}</select><div className="flex flex-wrap gap-1">{localPainZones.map(z=><span key={z} onClick={()=>togglePainZone(z)} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-2 py-1 rounded text-xs font-bold cursor-pointer hover:bg-red-200 dark:hover:bg-red-800">{z} ×</span>)}</div></div>
                            <div className="flex gap-2 mt-4"><button onClick={confirmData} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg hover:opacity-90 flex items-center justify-center gap-2"><Icon name="save"/> SALVAR DADOS</button></div>
                        </div>
                    </div>
                </div>
            );
        };

        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('wellness'); 
            
            const safeArray = (arr, fallback) => (Array.isArray(arr) && arr.length > 0) ? arr : fallback;
            const safeObj = (obj) => obj && typeof obj === 'object' ? obj : {};

            const [themeColor, setThemeColor] = useState(initialData?.themeColor || '#1e3a8a');
            const [players, setPlayers] = useState(safeArray(initialData?.players, [{name: "Jogador 1", image: null}, {name: "Jogador 2", image: null}]));
            const [trainingLog, setTrainingLog] = useState(safeObj(initialData?.trainingLog));
            const [assessments, setAssessments] = useState(safeObj(initialData?.assessments));
            const [dmRecords, setDmRecords] = useState(safeArray(initialData?.dmRecords, []));
            const [matchMinutes, setMatchMinutes] = useState(safeObj(initialData?.matchMinutes));
            const [header, setHeader] = useState(safeObj(initialData?.header));
            const [logo, setLogo] = useState(initialData?.logo || null);
            const [darkMode, setDarkMode] = useState(initialData?.darkMode || false);
            const [days, setDays] = useState(safeArray(initialData?.days, [
                { id: 1, md: 'MD-4', name: 'SEGUNDA', date:'', am: [], pm: [] },
                { id: 2, md: 'MD-3', name: 'TERÇA', date:'', am: [], pm: [] },
                { id: 3, md: 'MD-2', name: 'QUARTA', date:'', am: [], pm: [] },
                { id: 4, md: 'MD-1', name: 'QUINTA', date:'', am: [], pm: [] },
                { id: 5, md: 'JOGO', name: 'SEXTA', date:'', am: [], pm: [] },
                { id: 6, md: 'MD+1', name: 'SÁBADO', date:'', am: [], pm: [] },
                { id: 7, md: 'MD+2', name: 'DOMINGO', date:'', am: [], pm: [] }
            ]));

            const [showSettings, setShowSettings] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [syncStatus, setSyncStatus] = useState(''); 

            useEffect(() => {
                if (darkMode) document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }, [darkMode]);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            useEffect(() => {
                if(!user) return;
                const timeoutId = setTimeout(() => {
                    setSyncStatus('Salvando...');
                    const dataToSave = { themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days };
                    db.collection('coachData').doc(user.uid).set(dataToSave, { merge: true })
                        .then(() => { setSyncStatus('☁️ Sincronizado'); setTimeout(() => setSyncStatus(''), 3000); })
                        .catch((err) => { setSyncStatus('❌ Erro na Nuvem'); console.error(err); });
                }, 2000); 
                return () => clearTimeout(timeoutId);
            }, [themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, user]);

            const activeAlerts = useMemo(() => {
                const today = getTodayStr(); let alerts = [];
                (players||[]).forEach((p, i) => {
                    if(p.injured) return;
                    const log = trainingLog[today]?.[i] || {};
                    if(log.wellness?.soreness >= 5) alerts.push({ type: 'danger', icon: 'bolt', text: `${p.name} relatou dor aguda (Nível ${log.wellness.soreness}).`});
                    if(log.wellness?.sleep > 0 && log.wellness?.sleep <= 2) alerts.push({ type: 'warning', icon: 'moon', text: `${p.name} relatou sono ruim.`});
                    const todayLoad = (log.rpe_am||0)+(log.rpe_pm||0);
                    if(todayLoad > 0) {
                        const historyDates = getDatesInRange(today, 7).slice(1); let chronicLoad = 0; historyDates.forEach(d => chronicLoad += ((trainingLog[d]?.[i]?.rpe_am||0)+(trainingLog[d]?.[i]?.rpe_pm||0))); 
                        const avgLoad = (chronicLoad + todayLoad) / 7;
                        if(avgLoad > 0 && todayLoad > avgLoad * 1.5) alerts.push({ type: 'danger', icon: 'activity', text: `${p.name} com sobrecarga aguda hoje.`});
                    }
                    const recentDates = getDatesInRange(today, 7); let minsLast7 = 0;
                    recentDates.forEach(d => minsLast7 += (matchMinutes[d]?.[i] || 0));
                    if (minsLast7 >= 150) alerts.push({ type: 'danger', icon: 'alert', text: `${p.name} acumulou ${minsLast7}min de jogo. Risco alto.`});
                });
                const activeDm = (dmRecords||[]).filter(r => r.status === 'Active');
                if (activeDm.length > 0) alerts.push({ type: 'info', icon: 'medkit', text: `${activeDm.length} atleta(s) no DM.`});
                return alerts;
            }, [players, trainingLog, dmRecords, matchMinutes]);

            return (
                <div className="flex flex-col h-full bg-slate-100 dark:bg-slate-900 transition-colors duration-300">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} header={header} setHeader={setHeader} logo={logo} setLogo={setLogo} onExport={()=>{}} onImport={()=>{}} />
                    {showNotifications && <NotificationCenter alerts={activeAlerts} onClose={()=>setShowNotifications(false)} />}
                    <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0 no-print transition-colors duration-300">
                        <div className="font-black text-xl italic text-slate-800 dark:text-white flex items-center gap-2">
                            <div><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] not-italic bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 px-1.5 py-0.5 rounded ml-1">V118</span></div>
                            <div className={`flex items-center gap-1 px-2 py-0.5 rounded-full text-[9px] font-bold border ${isOnline ? 'bg-green-50 text-green-600 border-green-200' : 'bg-red-50 text-red-600 border-red-200'}`}><div className={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}></div>{isOnline ? 'ONLINE' : 'OFFLINE'}</div>
                            {syncStatus && <span className="text-[9px] font-bold text-slate-400 animate-pulse">{syncStatus}</span>}
                        </div>
                        <div className="flex gap-1 items-center">
                            <button onClick={()=>setShowNotifications(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 relative"><Icon name="bell" size={20}/>{activeAlerts.length > 0 && <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-800"></span>}</button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400">{darkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}</button>
                            <button onClick={()=>window.print()} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-xs flex items-center gap-1"><Icon name="download"/></button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700" style={{color: themeColor}}><Icon name="settings" size={24}/></button>
                            <button onClick={()=>auth.signOut().then(() => window.location.reload())} className="p-2 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500" title="Sair"><Icon name="logout" size={20}/></button>
                        </div>
                    </div>
                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner no-print"><button onClick={()=>setTab('squad')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>ELENCO</button><button onClick={()=>setTab('micro')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MICROCICLO</button><button onClick={()=>setTab('wellness')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='wellness'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>WELLNESS</button><button onClick={()=>setTab('pse')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='pse'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>CARGA/PSE</button><button onClick={()=>setTab('match')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='match'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MATCH</button><button onClick={()=>setTab('assessment')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='assessment'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>AVALIAÇÃO</button><button onClick={()=>setTab('dm')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='dm'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>DM</button></div>
                    <div className="flex-1 overflow-hidden relative" id="print-area">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                        {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} />}
                        {tab === 'wellness' && <WellnessDashboard players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'match' && <PreGameView players={players} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} />}
                        {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} />}
                        {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const CloudWrapper = ({ user }) => {
            const [initialData, setInitialData] = useState(null);
            const [loadingCloud, setLoadingCloud] = useState(true);

            useEffect(() => {
                const unsubscribe = db.collection('coachData').doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) { setInitialData(doc.data()); } 
                    else { setInitialData({}); }
                    setLoadingCloud(false);
                }, err => {
                    console.error("Cloud fetch error:", err);
                    setInitialData({});
                    setLoadingCloud(false);
                });
                return () => unsubscribe();
            }, [user]);

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold"><Icon name="cloud" size={40} className="animate-bounce text-blue-500 mb-4"/>Sincronizando...</div>;
            return <ErrorBoundary><MainApp user={user} initialData={initialData} /></ErrorBoundary>;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-state');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loading) return null;
            if (!user) return <LoginScreen onLogin={() => {}} />;
            return <CloudWrapper user={user} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
