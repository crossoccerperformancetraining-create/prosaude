        };

        const PSEView = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [date, setDate] = useState(getTodayStr()); 
            const [localRPEs, setLocalRPEs] = useState({});
            const [saveStatus, setSaveStatus] = useState('');
            const [selectedForAdvice, setSelectedForAdvice] = useState(null); 
            const saveTimeoutRef = useRef(null);
            useEffect(() => { const c = {}; players.forEach((_, i) => { const log = trainingLog[date]?.[i] || {}; c[i] = { am: log.rpe_am || 0, pm: log.rpe_pm || 0 }; }); setLocalRPEs(c); }, [date, players, trainingLog]);
            const saveToMain = (currentLocal) => { setSaveStatus('Salvando...'); const newLog = {...trainingLog}; if(!newLog[date]) newLog[date] = {}; players.forEach((_, i) => { if(!newLog[date][i]) newLog[date][i] = {}; newLog[date][i].rpe_am = currentLocal[i].am; newLog[date][i].rpe_pm = currentLocal[i].pm; }); setTrainingLog(newLog); setTimeout(() => setSaveStatus('Salvo'), 500); setTimeout(() => setSaveStatus(''), 2000); };
            const updateRPE = (i, period, val) => { const newValue = parseInt(val); setSelectedForAdvice(i); setLocalRPEs(prev => { const next = {...prev, [i]: {...prev[i], [period]: newValue}}; if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); saveTimeoutRef.current = setTimeout(() => { saveToMain(next); }, 1000); return next; }); };
            const manualSave = () => { if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); saveToMain(localRPEs); showToast("Salvo manualmente!"); };
            const exportPSE = () => { let csv = "Atleta\tPSE Manhã\tPSE Tarde\tTotal\n"; players.forEach((p, i) => { const am = localRPEs[i]?.am || 0; const pm = localRPEs[i]?.pm || 0; csv += `${p.name}\t${am}\t${pm}\t${am+pm}\n`; }); navigator.clipboard.writeText(csv); showToast("Copiado!"); };
            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col relative">
                    <div className={`status-badge ${saveStatus ? 'show' : ''} z-50`}>{saveStatus === 'Salvo' ? '💾 SALVO' : '⏳ SALVANDO...'}</div>
                    <div className="flex justify-between items-center mb-6 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 shrink-0"><div className="flex items-center gap-2"><h2 className="text-xl font-bold text-slate-700 dark:text-slate-100 flex items-center gap-2"><Icon name="activity"/> CONTROLE DE CARGA (PSE)</h2></div><div className="flex gap-2"><button onClick={manualSave} className="bg-slate-200 dark:bg-slate-700 p-2 rounded hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300"><Icon name="save"/></button><input type="date" value={date} onChange={e=>setDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 dark:text-white font-bold p-2 rounded border dark:border-slate-600"/></div></div>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col flex-1 min-h-0"><div className="grid grid-cols-12 bg-slate-100 dark:bg-slate-700 p-3 text-xs font-bold text-slate-500 dark:text-slate-300 uppercase shrink-0"><div className="col-span-4">Atleta</div><div className="col-span-4 text-center">Manhã (0-10)</div><div className="col-span-4 text-center">Tarde (0-10)</div></div><div className="divide-y divide-slate-100 dark:divide-slate-700 overflow-y-auto flex-1">{players.map((p, i) => (<div key={i} className={`grid grid-cols-12 p-3 items-center hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer ${selectedForAdvice===i ? 'bg-blue-50 dark:bg-blue-900/20' : ''}`} onClick={()=>setSelectedForAdvice(i)}><div className="col-span-4"><div className="flex items-center gap-3 mb-1"><div className="w-8 h-8 rounded-full bg-slate-200 overflow-hidden shrink-0">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div><span className="font-bold text-sm text-slate-700 dark:text-slate-200 truncate">{p.name}</span></div>{selectedForAdvice===i && <LoadAdvisor playerIndex={i} date={date} trainingLog={trainingLog}/>}</div><div className="col-span-4 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.am||0} onChange={e=>updateRPE(i,'am',e.target.value)} className="w-24 mr-2 accent-blue-600"/><span className="font-bold w-6 text-center text-blue-600 dark:text-blue-400">{localRPEs[i]?.am}</span></div><div className="col-span-4 flex justify-center"><input type="range" min="0" max="10" value={localRPEs[i]?.pm||0} onChange={e=>updateRPE(i,'pm',e.target.value)} className="w-24 mr-2 accent-orange-500"/><span className="font-bold w-6 text-center text-orange-500 dark:text-orange-400">{localRPEs[i]?.pm}</span></div></div>))}<div className="h-20"></div></div></div></div>
            );
        };

        const TeamCoachAI = ({ activePlayers, pseAvg, dmCount }) => {
            const numericAvg = parseFloat(pseAvg);
            let title = "Diagnóstico da Equipe"; let suggestion = ""; let colorClass = "bg-slate-800 text-slate-300";
            if (numericAvg >= 16) { title = "ALERTA VERMELHO (Sobrecarga)"; suggestion = "Carga Extremamente Alta. RISCO DE LESÃO ELEVADO. Amanhã: Recuperação passiva ou folga obrigatória."; colorClass = "bg-red-900 text-red-50"; } 
            else if (numericAvg >= 12) { title = "Zona de Alta Intensidade"; suggestion = "Treino exigente. Amanhã: Carga baixa/moderada (foco tático sem contato) para supercompensação."; colorClass = "bg-orange-800 text-orange-50"; } 
            else if (numericAvg >= 8) { title = "Zona de Manutenção/Desenvolvimento"; suggestion = "Carga Ideal. Amanhã: Pode manter a intensidade se não for véspera de jogo (MD-1)."; colorClass = "bg-green-800 text-green-50"; } 
            else if (numericAvg > 0) { title = "Carga Baixa / Regenerativo"; suggestion = "Estímulo leve hoje. Amanhã: Oportunidade para 'Choque' (Força ou Resistência) se longe do jogo."; colorClass = "bg-blue-800 text-blue-50"; } 
            else { title = "Sem Dados Suficientes"; suggestion = "Aguardando dados de PSE dos atletas para gerar análise."; colorClass = "bg-slate-800 text-slate-300"; }
            if(dmCount >= 3) { suggestion += ` ALERTA: ${dmCount} atletas no DM. Atenção na rotação.`; }
            return (<div className={`md:col-span-2 rounded-xl shadow p-5 border border-slate-700 flex flex-col justify-center relative overflow-hidden ${colorClass}`}><div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="brain" size={80}/></div><div className="flex items-center gap-2 mb-2 z-10"><div className="bg-white/20 p-1.5 rounded-full"><Icon name="brain" size={20}/></div><h3 className="font-bold text-sm uppercase tracking-wider opacity-80">Técnico Virtual (Equipe)</h3></div><div className="z-10"><div className="text-xl font-black mb-1">{title}</div><div className="text-sm font-medium opacity-90 leading-snug">{suggestion}</div></div></div>);
        };

        const PreGameView = ({ players, themeColor, trainingLog, dmRecords, matchMinutes, setMatchMinutes }) => {
            const [monitorDate, setMonitorDate] = useState(getTodayStr()); 
            const dailyData = trainingLog[monitorDate] || {};
            const activePlayers = players.filter((_, i) => dailyData[i]?.wellness);
            const teamHooperAvg = activePlayers.length > 0 ? Math.round(activePlayers.reduce((acc, _, i) => acc + Object.values(dailyData[i]?.wellness || {}).reduce((a,b)=>a+b,0), 0) / activePlayers.length) : 4;
            const rpePlayers = players.filter((_, i) => (dailyData[i]?.rpe_am || 0) + (dailyData[i]?.rpe_pm || 0) > 0);
            const pseSum = rpePlayers.reduce((acc, _, i) => acc + (dailyData[i]?.rpe_am || 0) + (dailyData[i]?.rpe_pm || 0), 0);
            const pseAvg = rpePlayers.length > 0 ? (pseSum / rpePlayers.length).toFixed(1) : 0;
            const pseColor = pseAvg >= 14 ? '#ef4444' : pseAvg >= 8 ? '#eab308' : '#22c55e';
            const dmCount = players.filter(p => p.injured).length;
            
            const weeklyDates = getDatesInRange(monitorDate, 7).reverse();
            const weeklyData = weeklyDates.map(d => {
                const dayLog = trainingLog[d] || {};
                let loadSum = 0, wellnessSum = 0, countLoad = 0, countWell = 0;
                players.forEach((_, i) => { const l = dayLog[i]; if(l) { if((l.rpe_am||0)+(l.rpe_pm||0) > 0) { loadSum += ((l.rpe_am||0)+(l.rpe_pm||0)); countLoad++; } if(l.wellness) { wellnessSum += Object.values(l.wellness).reduce((a,b)=>a+b,0); countWell++; } } });
                return { date: d, avgLoad: countLoad > 0 ? Math.round(loadSum/countLoad) : 0, avgWell: countWell > 0 ? Math.round(wellnessSum/countWell) : 0 };
            });

            const updateMinutes = (pIdx, val) => {
                const newMins = {...matchMinutes};
                if(!newMins[monitorDate]) newMins[monitorDate] = {};
                newMins[monitorDate][pIdx] = parseInt(val) || 0;
                setMatchMinutes(newMins);
            };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in">
                    <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2"><h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="trophy"/> Performance & Carga</h2><div className="flex gap-2"><button onClick={()=>{window.print()}} className="bg-white dark:bg-slate-700 border dark:border-slate-600 rounded px-3 py-1.5 text-xs font-bold shadow-sm hover:bg-slate-50 dark:hover:bg-slate-600 dark:text-white no-print flex items-center gap-1"><Icon name="share"/> PDF</button><div className="flex items-center gap-2 text-xs bg-white dark:bg-slate-700 border dark:border-slate-600 rounded px-3 py-1.5 shadow-sm"><span className="font-bold text-slate-500 dark:text-slate-300 uppercase">Análise:</span><input type="date" value={monitorDate} onChange={e=>setMonitorDate(e.target.value)} className="bg-transparent text-slate-800 dark:text-slate-100 font-bold outline-none"/></div></div></div>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center col-span-1"><SpeedometerGauge value={teamHooperAvg} /></div>
                        <div className="bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-100 dark:border-slate-700 flex items-center gap-4"><DonutChart value={pseAvg} max={20} color={pseColor} size={60} /><div><div className="text-xl font-black text-slate-800 dark:text-slate-200">CARGA DIA</div><div className="text-[10px] text-slate-400 font-bold uppercase">Média (M+T)</div></div></div>
                        <TeamCoachAI activePlayers={activePlayers} pseAvg={pseAvg} dmCount={dmCount} />
                    </div>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-100 dark:border-slate-700 p-4 mb-8 overflow-x-auto">
                        <h3 className="text-xs font-bold text-slate-400 uppercase mb-3 flex items-center gap-2"><Icon name="barChart"/> Contexto Semanal (Média Equipe)</h3>
                        <div className="flex gap-2 min-w-max">
                            {weeklyData.map((d, idx) => {
                                const isToday = d.date === monitorDate;
                                const wColor = d.avgWell >= 20 ? 'bg-red-400' : d.avgWell >= 14 ? 'bg-yellow-400' : 'bg-green-400';
                                return (
                                    <div key={idx} className={`flex-1 min-w-[60px] flex flex-col items-center p-2 rounded border ${isToday ? 'bg-blue-50 dark:bg-blue-900/30 border-blue-200 dark:border-blue-800' : 'bg-slate-50 dark:bg-slate-700 border-transparent'}`}>
                                        <div className="text-[9px] font-bold text-slate-400 mb-1">{formatDateBR(d.date).slice(0,5)}</div>
                                        <div className="flex items-end gap-1 h-20 w-full justify-center">
                                            <div className="w-3 bg-blue-600 rounded-t" style={{height: `${Math.min(100, (d.avgLoad/20)*100)}%`}} title={`Carga: ${d.avgLoad}`}></div>
                                            <div className={`w-3 ${wColor} rounded-t`} style={{height: `${Math.min(100, (d.avgWell/35)*100)}%`}} title={`Wellness: ${d.avgWell}`}></div>
                                        </div>
                                        <div className="mt-1 text-[9px] font-bold text-slate-600 dark:text-slate-300">{d.avgLoad} | {d.avgWell}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    <h3 className="text-lg font-bold text-slate-700 dark:text-slate-200 mb-4">Status Individual ({formatDateBR(monitorDate)})</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">{players.map((p, i) => { const pLog = dailyData[i] || {}; const totalHooper = pLog.wellness ? Object.values(pLog.wellness).reduce((a,b)=>a+b,0) : 4; const totalDaily = (pLog.rpe_am || 0) + (pLog.rpe_pm || 0); const painAlert = (pLog.wellness?.soreness || 0) >= 5; const painZones = pLog.painZones || []; const borderClass = painAlert ? 'border-red-500 animate-pulse border-4' : 'border-slate-200 dark:border-slate-700'; return (<div key={i} className={`bg-white dark:bg-slate-800 p-4 rounded-xl border shadow-sm flex flex-col gap-3 relative overflow-hidden ${borderClass}`}>{painAlert && <div className="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-bold px-2 py-1 flex items-center gap-1"><Icon name="alert" size={10} stroke="white"/> RISCO DE LESÃO</div>}<div className="flex items-center gap-4"><div className="w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-700 overflow-hidden shrink-0 border-2 border-slate-200 dark:border-slate-600">{p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="user" size={24}/></div>}</div><div className="flex-1"><h3 className="font-bold text-slate-800 dark:text-slate-100 text-lg uppercase truncate">{p.name}</h3><div className="flex gap-2 text-[10px] font-bold mt-1 text-slate-500"><span>SONO: {pLog.wellness?.sleep || '-'}</span> | <span>FADIGA: {pLog.wellness?.fatigue || '-'}</span></div></div><div className="w-20"><MiniGauge value={totalHooper}/></div></div>{painZones.length > 0 && (<div className="bg-red-50 dark:bg-red-900/30 p-1 rounded border border-red-100 dark:border-red-800"><span className="text-[9px] font-bold text-red-600 dark:text-red-400 uppercase flex flex-wrap gap-1 items-center"><Icon name="medkit" size={10}/> DORES: {painZones.join(', ')}</span></div>)}<div className="flex justify-between mt-1 px-2 border-t dark:border-slate-700 pt-2 items-center"><div className="text-[10px] text-slate-400 font-bold">CARGA (M+T): <span className="text-slate-700 dark:text-slate-200 text-lg">{totalDaily > 0 ? totalDaily : '-'}</span></div><div className="flex items-center gap-1"><span className="text-[9px] font-bold text-slate-400">MINUTOS:</span><input type="number" className="w-12 p-1 border dark:border-slate-600 rounded text-xs text-center dark:bg-slate-700 dark:text-white" value={matchMinutes?.[monitorDate]?.[i] || ''} onChange={e=>updateMinutes(i, e.target.value)} /></div></div></div>); })}</div>
                </div>
            );
        };

        const MainApp = ({ user, initialData }) => {
            const [tab, setTab] = useState('match'); 
            
            const [themeColor, setThemeColor] = useState(initialData?.themeColor || '#1e3a8a');
            const [players, setPlayers] = useState(initialData?.players || [{name: "Jogador 1", image: null}, {name: "Jogador 2", image: null}]);
            const [trainingLog, setTrainingLog] = useState(initialData?.trainingLog || {});
            const [assessments, setAssessments] = useState(initialData?.assessments || {});
            const [dmRecords, setDmRecords] = useState(initialData?.dmRecords || []);
            const [matchMinutes, setMatchMinutes] = useState(initialData?.matchMinutes || {});
            const [header, setHeader] = useState(initialData?.header || {});
            const [logo, setLogo] = useState(initialData?.logo || null);
            const [darkMode, setDarkMode] = useState(initialData?.darkMode || false);
            const [days, setDays] = useState(initialData?.days || [
                { id: 1, md: 'MD-4', name: 'SEGUNDA', date:'', am: [], pm: [] },
                { id: 2, md: 'MD-3', name: 'TERÇA', date:'', am: [], pm: [] },
                { id: 3, md: 'MD-2', name: 'QUARTA', date:'', am: [], pm: [] },
                { id: 4, md: 'MD-1', name: 'QUINTA', date:'', am: [], pm: [] },
                { id: 5, md: 'JOGO', name: 'SEXTA', date:'', am: [], pm: [] },
                { id: 6, md: 'MD+1', name: 'SÁBADO', date:'', am: [], pm: [] },
                { id: 7, md: 'MD+2', name: 'DOMINGO', date:'', am: [], pm: [] }
            ]);

            const [showSettings, setShowSettings] = useState(false);
            const [showNotifications, setShowNotifications] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [syncStatus, setSyncStatus] = useState(''); 

            useEffect(() => {
                if (darkMode) document.body.classList.add('dark');
                else document.body.classList.remove('dark');
            }, [darkMode]);

            // OFFLINE/ONLINE LISTENER
            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // AUTO-SAVE TO FIRESTORE DEBOUNCED
            useEffect(() => {
                if(!user) return;
                const timeoutId = setTimeout(() => {
                    setSyncStatus('Salvando...');
                    const dataToSave = { themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days };
                    db.collection('coachData').doc(user.uid).set(dataToSave, { merge: true })
                        .then(() => {
                            setSyncStatus('☁️ Sincronizado');
                            setTimeout(() => setSyncStatus(''), 3000);
                        })
                        .catch((err) => {
                            setSyncStatus('❌ Erro na Nuvem');
                            console.error(err);
                        });
                }, 2000); 
                return () => clearTimeout(timeoutId);
            }, [themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days, user]);

            const activeAlerts = useMemo(() => {
                const today = getTodayStr();
                let alerts = [];
                players.forEach((p, i) => {
                    if(p.injured) return;
                    const log = trainingLog[today]?.[i] || {};
                    if(log.wellness?.soreness >= 5) alerts.push({ type: 'danger', icon: 'bolt', text: `${p.name} relatou dor aguda (Nível ${log.wellness.soreness}).`});
                    if(log.wellness?.sleep > 0 && log.wellness?.sleep <= 2) alerts.push({ type: 'warning', icon: 'moon', text: `${p.name} relatou sono muito ruim.`});
                    
                    const todayLoad = (log.rpe_am||0)+(log.rpe_pm||0);
                    if(todayLoad > 0) {
                        const historyDates = getDatesInRange(today, 7).slice(1); 
                        let chronicLoad = 0; historyDates.forEach(d => chronicLoad += ((trainingLog[d]?.[i]?.rpe_am||0)+(trainingLog[d]?.[i]?.rpe_pm||0))); 
                        const avgLoad = (chronicLoad + todayLoad) / 7;
                        if(avgLoad > 0 && todayLoad > avgLoad * 1.5) alerts.push({ type: 'danger', icon: 'activity', text: `${p.name} com sobrecarga aguda hoje.`});
                    }

                    const recentDates = getDatesInRange(today, 7);
                    let minsLast7 = 0;
                    recentDates.forEach(d => minsLast7 += (matchMinutes[d]?.[i] || 0));
                    if (minsLast7 >= 150) {
                        alerts.push({ type: 'danger', icon: 'alert', text: `${p.name} acumulou ${minsLast7}min de jogo em 7 dias. Risco alto, considere poupar.`});
                    }
                });
                const activeDm = dmRecords.filter(r => r.status === 'Active');
                if (activeDm.length > 0) alerts.push({ type: 'info', icon: 'medkit', text: `${activeDm.length} atleta(s) no Departamento Médico.`});
                return alerts;
            }, [players, trainingLog, dmRecords, matchMinutes]);

            const handleLogout = () => {
                auth.signOut().then(() => { window.location.reload(); });
            };

            const handleExportData = () => {
                const data = { themeColor, players, trainingLog, assessments, dmRecords, matchMinutes, header, logo, darkMode, days };
                const b = new Blob([JSON.stringify(data)], {type:"application/json"});
                smartShare(b, `procoach_bkp_${getTodayStr()}.json`, "Backup ProCoach");
            };

            const handleImportData = (d) => {
                if(d.themeColor) setThemeColor(d.themeColor);
                if(d.players) setPlayers(d.players);
                if(d.trainingLog) setTrainingLog(d.trainingLog);
                if(d.assessments) setAssessments(d.assessments);
                if(d.dmRecords) setDmRecords(d.dmRecords);
                if(d.matchMinutes) setMatchMinutes(d.matchMinutes);
                if(d.header) setHeader(d.header);
                if(d.logo !== undefined) setLogo(d.logo);
                if(d.darkMode !== undefined) setDarkMode(d.darkMode);
                if(d.days) setDays(d.days);
            };

            return (
                <div className="flex flex-col h-full bg-slate-100 dark:bg-slate-900 transition-colors duration-300">
                    <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} themeColor={themeColor} setThemeColor={setThemeColor} header={header} setHeader={setHeader} logo={logo} setLogo={setLogo} onExport={handleExportData} onImport={handleImportData} />
                    {showNotifications && <NotificationCenter alerts={activeAlerts} onClose={()=>setShowNotifications(false)} />}
                    
                    <div className="bg-white dark:bg-slate-800 border-b dark:border-slate-700 p-2 px-4 flex justify-between items-center shadow-sm z-30 shrink-0 no-print transition-colors duration-300">
                        <div className="font-black text-xl italic text-slate-800 dark:text-white flex items-center gap-2">
                            <div><span style={{color: themeColor}}>PRO</span>COACH <span className="text-[9px] not-italic bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 px-1.5 py-0.5 rounded ml-1">V115</span></div>
                            <div className={`flex items-center gap-1 px-2 py-0.5 rounded-full text-[9px] font-bold border ${isOnline ? 'bg-green-50 text-green-600 border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800' : 'bg-red-50 text-red-600 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800'}`}>
                                <div className={`w-1.5 h-1.5 rounded-full ${isOnline ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                {isOnline ? 'ONLINE' : 'OFFLINE'}
                            </div>
                            {syncStatus && <span className="text-[9px] font-bold text-slate-400 animate-pulse">{syncStatus}</span>}
                        </div>
                        <div className="flex gap-1 items-center">
                            <button onClick={()=>setShowNotifications(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 relative">
                                <Icon name="bell" size={20}/>
                                {activeAlerts.length > 0 && <span className="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-slate-800"></span>}
                            </button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400">{darkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}</button>
                            <button onClick={()=>window.print()} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 font-bold text-xs flex items-center gap-1"><Icon name="download"/></button>
                            <button onClick={()=>setShowSettings(true)} className="p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-700" style={{color: themeColor}}><Icon name="settings" size={24}/></button>
                            <button onClick={handleLogout} className="p-2 rounded hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500" title="Sair"><Icon name="logout" size={20}/></button>
                        </div>
                    </div>
                    <div className="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-lg gap-1 overflow-x-auto shadow-inner no-print"><button onClick={()=>setTab('squad')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='squad'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>ELENCO</button><button onClick={()=>setTab('micro')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='micro'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MICROCICLO</button><button onClick={()=>setTab('wellness')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='wellness'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>WELLNESS</button><button onClick={()=>setTab('pse')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='pse'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>CARGA/PSE</button><button onClick={()=>setTab('match')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='match'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>MATCH</button><button onClick={()=>setTab('assessment')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='assessment'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>AVALIAÇÃO</button><button onClick={()=>setTab('dm')} className={`px-3 py-1.5 rounded text-xs font-bold transition-all shrink-0 ${tab==='dm'?'bg-white dark:bg-slate-700 shadow text-slate-800 dark:text-white':'text-slate-400 dark:text-slate-500'}`}>DM</button></div>
                    <div className="flex-1 overflow-hidden relative" id="print-area">
                        {tab === 'squad' && <SquadView players={players} setPlayers={setPlayers} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} />}
                        {tab === 'micro' && <MicrocycleView days={days} setDays={setDays} themeColor={themeColor} />}
                        {tab === 'wellness' && <WellnessView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'pse' && <PSEView players={players} themeColor={themeColor} trainingLog={trainingLog} setTrainingLog={setTrainingLog} />}
                        {tab === 'match' && <PreGameView players={players} themeColor={themeColor} trainingLog={trainingLog} dmRecords={dmRecords} matchMinutes={matchMinutes} setMatchMinutes={setMatchMinutes} />}
                        {tab === 'assessment' && <AssessmentView players={players} themeColor={themeColor} assessments={assessments} setAssessments={setAssessments} />}
                        {tab === 'dm' && <MedicalView players={players} setPlayers={setPlayers} dmRecords={dmRecords} setDmRecords={setDmRecords} themeColor={themeColor} />}
                    </div>
                </div>
            );
        };

        const CloudWrapper = ({ user }) => {
            const [initialData, setInitialData] = useState(null);
            const [loadingCloud, setLoadingCloud] = useState(true);

            useEffect(() => {
                db.collection('coachData').doc(user.uid).get().then(doc => {
                    if (doc.exists) {
                        setInitialData(doc.data());
                    } else {
                        setInitialData({});
                    }
                    setLoadingCloud(false);
                }).catch(e => {
                    console.error("Cloud fetch error:", e);
                    setInitialData({});
                    setLoadingCloud(false);
                });
            }, [user]);

            if (loadingCloud) return <div className="flex flex-col h-screen w-screen items-center justify-center bg-slate-900 text-slate-300 font-bold"><Icon name="cloud" size={40} className="animate-bounce text-blue-500 mb-4"/>Sincronizando Banco de Dados...</div>;
            return <MainApp user={user} initialData={initialData} />;
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                    const loader = document.getElementById('loading-state');
                    if(loader) loader.style.display = 'none';
                });
                return () => unsubscribe();
            }, []);

            if (loading) return <div className="flex h-screen w-screen items-center justify-center bg-slate-900 text-white font-bold">Verificando Segurança...</div>;
            if (!user) return <LoginScreen onLogin={() => {}} />;
            
            return <CloudWrapper user={user} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
