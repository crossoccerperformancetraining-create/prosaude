        const compressImage = (file, maxWidth=150, quality=0.5) => { return new Promise((resolve) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = (event) => { const img = new Image(); img.src = event.target.result; img.onload = () => { const elem = document.createElement('canvas'); const scaleFactor = maxWidth / img.width; elem.width = maxWidth; elem.height = img.height * scaleFactor; const ctx = elem.getContext('2d'); ctx.drawImage(img, 0, 0, elem.width, elem.height); resolve(elem.toDataURL('image/jpeg', quality)); }; }; }); };
        const useStickyState = (defaultValue, key) => { const [value, setValue] = useState(() => { try { const stickyValue = window.localStorage.getItem(key); return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue; } catch (e) { return defaultValue; } }); useEffect(() => { try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} }, [key, value]); return [value, setValue]; };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('crossoccerperformancetraining@gmail.com');

                                    warning: "bg-yellow-50 text-yellow-800 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-300 dark:border-yellow-800",

                                return (
                                    <div key={i} className={`p-3 rounded-lg border flex gap-3 items-start ${colors[a.type]}`}>
                                        <div className="mt-0.5"><Icon name={a.icon} size={16}/></div>

                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            )
        };

        const SpeedometerGauge = ({ value }) => {
            const min=4, max=28; const normalized=Math.max(min, Math.min(max, value));
            const angle=((normalized-min)/(max-min))*180-90;
            return (<div className="flex flex-col items-center"><div className="gauge-container"><svg viewBox="0 0 200 100" className="w-full h-full"><path d="M20 100 A80 80 0 0 1 180 100" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="20"/><path d="M20 100 A80 80 0 0 1 73 36" fill="none" stroke="#22c55e" strokeWidth="20" strokeDasharray="1000"/><path d="M73 36 A80 80 0 0 1 127 36" fill="none" stroke="#eab308" strokeWidth="20" strokeDasharray="1000"/><path d="M127 36 A80 80 0 0 1 180 100" fill="none" stroke="#ef4444" strokeWidth="20" strokeDasharray="1000"/></svg><div className="gauge-needle" style={{transform:`rotate(${angle}deg)`}}></div><div className="gauge-center"></div></div><div className="text-3xl font-black -mt-4 text-slate-700 dark:text-slate-200">{value}</div><div className="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 mt-1">Prontidão Equipe</div></div>);
        };
        const MiniGauge = ({ value, min=4, max=28, reverse=false, label="" }) => {
            const normalized=Math.max(min, Math.min(max, value)); const angle=((normalized-min)/(max-min))*180-90;
            const c1=reverse?"#ef4444":"#22c55e"; const c2="#eab308"; const c3=reverse?"#22c55e":"#ef4444";
            return (<div className="flex flex-col items-center"><div className="mini-gauge-container"><svg viewBox="0 0 80 40" className="w-full h-full"><path d="M5 40 A35 35 0 0 1 75 40" fill="none" className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="8"/><path d="M5 40 A35 35 0 0 1 28 12" fill="none" stroke={c1} strokeWidth="8"/><path d="M28 12 A35 35 0 0 1 52 12" fill="none" stroke={c2} strokeWidth="8"/><path d="M52 12 A35 35 0 0 1 75 40" fill="none" stroke={c3} strokeWidth="8"/></svg><div className="mini-gauge-needle" style={{transform:`rotate(${angle}deg)`}}></div><div className="absolute bottom-0 w-2 h-2 bg-slate-700 dark:bg-slate-300 rounded-full left-[39px]"></div></div><div className="text-[10px] font-black text-slate-700 dark:text-slate-200 -mt-1">{value}</div>{label && <div className="text-[8px] text-slate-400 dark:text-slate-500 uppercase font-bold">{label}</div>}</div>);
        };
        const DonutChart = ({ value, max, color, label, size=80 }) => {
            const r=30, c=2*Math.PI*r, o=c-(value/max)*c;
            return (<div className="relative flex items-center justify-center" style={{width:size,height:size}}><svg width={size} height={size} viewBox="0 0 80 80" className="rotate-[-90deg]"><circle cx="40" cy="40" r={r} className="stroke-slate-200 dark:stroke-slate-700" strokeWidth="8" fill="transparent"/><circle cx="40" cy="40" r={r} stroke={color} strokeWidth="8" fill="transparent" strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.5s'}}/></svg><div className="absolute flex flex-col items-center"><span className="text-xl font-bold text-slate-700 dark:text-slate-200">{value}</span>{label&&<span className="text-[8px] uppercase font-bold text-slate-400 dark:text-slate-500">{label}</span>}</div></div>);
        };

        const ImportModal = ({ show, onClose, onImport }) => {

            const handleLogoFile = async (e) => { const f=e.target.files[0]; if(f) { try{const c=await compressImage(f,200,0.6); setLogo(c); showToast("Atualizado!");}catch(e){} } };
            const handleBackup = () => { try { const data={}; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i); if(k.startsWith('pc_')) data[k]=localStorage.getItem(k);} const b=new Blob([JSON.stringify(data)],{type:"application/json"}); smartShare(b, `procoach_bkp_${new Date().toISOString().slice(0,10)}.json`, "Backup ProCoach"); } catch(e) { showToast("Erro ao criar backup"); } };
            const handleRestore = (e) => { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=(e)=>{try{const d=JSON.parse(e.target.result); Object.keys(d).forEach(k=>{if(k.startsWith('pc_')) localStorage.setItem(k,d[k]);}); window.location.reload();}catch(e){showToast("Erro no arquivo")}}; r.readAsText(f); };
            return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in"><div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative"><div className="p-4 border-b dark:border-slate-700 flex justify-between items-center" style={{backgroundColor:themeColor}}><h2 className="text-white font-bold flex items-center gap-2"><Icon name="settings"/> CONFIG & BACKUP</h2><button onClick={onClose} className="text-white hover:bg-white/20 p-1 rounded"><Icon name="x"/></button></div><div className="p-6 space-y-6 max-h-[80vh] overflow-y-auto"><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Identidade</h3><div className="flex items-center gap-4"><div className="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-700 border-2 flex items-center justify-center relative group cursor-pointer overflow-hidden" style={{borderColor:themeColor}}>{logo?<img src={logo} className="w-full h-full object-contain"/>:<Icon name="image" className="text-slate-300 dark:text-slate-500" size={30}/>}<input type="file" ref={fileInputRef} className="hidden" onChange={handleLogoFile}/><div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100" onClick={()=>fileInputRef.current.click()}><Icon name="folder" className="text-white"/></div></div><div className="flex-1"><label className="text-[10px] font-bold text-slate-500 dark:text-slate-400">NOME</label><BufferedInput className="w-full border-b-2 border-slate-200 dark:border-slate-600 py-1 font-bold text-lg outline-none bg-transparent dark:text-white" value={header.teamName || ''} onSave={val=>setHeader({...header, teamName:val})}/><BufferedInput className="w-full text-xs mt-1 border-b border-slate-100 dark:border-slate-700 p-1 bg-transparent dark:text-slate-300" placeholder="Ou cole URL da logo..." value={logo && logo.startsWith('http')?logo:''} onSave={val=>setLogo(val)}/></div></div></div><div><h3 className="text-sm font-bold text-slate-400 uppercase mb-2">Tema</h3><input type="color" value={themeColor} onChange={e=>setThemeColor(e.target.value)} className="w-12 h-12 rounded-lg border-2 cursor-pointer dark:border-slate-600"/></div><div className="border-t dark:border-slate-700 pt-4"><div className="grid grid-cols-2 gap-2 mb-2"><button onClick={handleBackup} className="flex justify-center gap-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800 py-2 rounded font-bold text-xs"><Icon name="share" size={14}/> EXPORTAR TUDO</button><button onClick={()=>importInputRef.current.click()} className="flex justify-center gap-2 bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 border border-green-200 dark:border-green-800 py-2 rounded font-bold text-xs"><Icon name="upload" size={14}/> IMPORTAR DADOS</button><input type="file" ref={importInputRef} className="hidden" accept=".json" onChange={handleRestore}/></div><p className="text-[10px] text-slate-400 text-center mb-2">Use exportar para salvar uma cópia local por segurança.</p></div></div></div></div>);
        };

        const PlayerProfileModal = ({ player, playerIndex, logs, onClose, themeColor, setPlayers, players }) => {
            if (!player) return null;
            const today = getTodayStr(); 
            const currentLog = logs[today]?.[playerIndex] || {};
            const wellness = currentLog.wellness || {};
            const dates = getDatesInRange(today, 7).reverse();
            const toggleInjury = () => { const n = [...players]; n[playerIndex].injured = !n[playerIndex].injured; setPlayers(n); };
            
            const HistoryAI = () => {
                const painCounts = {};
                dates.forEach(d => { const l = logs[d]?.[playerIndex] || {}; if(l.painZones) l.painZones.forEach(z => { painCounts[z] = (painCounts[z]||0) + 1; }); });
                const chronic = Object.keys(painCounts).find(k => painCounts[k] >= 3);
                if (chronic) return (<div className="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 p-3 mb-4 rounded-r-lg shadow-sm"><div className="flex items-center gap-2 mb-1"><Icon name="brain" className="text-red-600 dark:text-red-400" size={18}/><span className="text-xs font-bold text-red-700 dark:text-red-300 uppercase">Fisiologista Virtual</span></div><div className="text-xs text-slate-700 dark:text-slate-300">Atenção: Dor recorrente em <strong>{chronic}</strong> detectada nesta semana. Risco elevado.</div></div>);
                return null;
            };

            const generateShareCard = async () => {
                const el = document.getElementById('export-card-' + playerIndex);
                if(!el) return;
                el.style.left = '0'; el.style.top = '0'; 
                try {
                    const canvas = await html2canvas(el, {scale: 2, useCORS: true, backgroundColor: '#0f172a'});
                    canvas.toBlob(blob => {
                        smartShare(blob, `card_${player.name}.png`, `Status - ${player.name}`);
                        el.style.left = '-9999px'; el.style.top = '-9999px';
                    });
                } catch(e) {
                    showToast("Erro ao gerar card");
                    el.style.left = '-9999px'; el.style.top = '-9999px';
                }
            };

            const totalW = Object.values(wellness).reduce((a,b)=>a+b,0) || 0;
            const wColor = totalW >= 25 ? 'text-red-500' : totalW >= 18 ? 'text-yellow-500' : 'text-green-500';

            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden relative flex flex-col max-h-[90vh]" onClick={e=>e.stopPropagation()}>
                        
                        <div className="p-6 relative text-white flex flex-col items-center shrink-0" style={{background:`linear-gradient(to bottom, ${themeColor}, #1e293b)`}}>
                            <button onClick={onClose} className="absolute top-4 right-4 text-white/70 hover:text-white"><Icon name="x" size={24}/></button>
                            <div className="w-32 h-32 rounded-full border-4 border-white dark:border-slate-700 bg-slate-200 dark:bg-slate-600 shadow-lg mb-2 overflow-hidden">{player.image?<img src={player.image} className="w-full h-full object-cover object-top" onError={(e)=>{e.target.style.display='none'}}/>:<div className="w-full h-full flex items-center justify-center text-slate-400"><Icon name="user" size={40}/></div>}</div>
                            <h2 className="text-2xl font-bold uppercase">{player.name}</h2>
                            <p className="text-white/70 text-sm font-bold">{player.number?`#${player.number} `:''} {player.position||'Atleta'}</p>
                            <div className="flex gap-2 mt-2">
                                <button onClick={toggleInjury} className={`px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 ${player.injured?'bg-red-500 text-white':'bg-green-500 text-white'}`}>{player.injured?<><Icon name="medkit" size={12}/> LESIONADO</>:<><Icon name="check" size={12}/> DISPONÍVEL</>}</button>
                            </div>
                        </div>
                        
                        <div className="p-6 space-y-6 overflow-y-auto flex-1">
                            <HistoryAI />
                            <div>
                                <h3 className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase mb-3 flex items-center gap-2"><Icon name="smile"/> Status ({formatDateBR(today)})</h3>
                                <div className="grid grid-cols-2 gap-4">{Object.entries({Sono:wellness.sleep,Estresse:wellness.stress,Fadiga:wellness.fatigue,Dor:wellness.soreness, Humor: wellness.mood}).map(([k,v])=>(<div key={k} className="bg-slate-50 dark:bg-slate-700 p-2 rounded border border-slate-100 dark:border-slate-600"><div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-500 dark:text-slate-400">{k}</span><span className="dark:text-white">{v||'-'}</span></div><div className="h-2 w-full bg-slate-200 dark:bg-slate-600 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all duration-500" style={{width:`${(v/7)*100}%`,backgroundColor:v>=5?'#ef4444':v>=3?'#eab308':'#22c55e'}}></div></div></div>))}</div>
                            </div>
                            <div>
                                <h3 className="text-sm font-bold text-slate-400 dark:text-slate-500 uppercase mb-3 flex items-center gap-2"><Icon name="list"/> Histórico de Dores & Carga</h3>
                                <div className="bg-slate-50 dark:bg-slate-700 rounded-xl border border-slate-100 dark:border-slate-600 overflow-hidden max-h-64 overflow-y-auto"><table className="w-full text-xs"><thead className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 sticky top-0"><tr><th className="p-2 text-left">Data</th><th className="p-2 text-center">Local Dor</th><th className="p-2 text-center">Carga</th></tr></thead><tbody>{dates.map(d=>{const l=logs[d]?.[playerIndex]||{};const t=(l.rpe_am||0)+(l.rpe_pm||0);const pz=l.painZones && l.painZones.length>0 ? l.painZones : null;return(<tr key={d} className="border-t border-slate-100 dark:border-slate-600"><td className="p-2 font-bold text-slate-600 dark:text-slate-300">{formatDateBR(d)}</td><td className="p-2 text-center">{pz ? <div className="flex flex-wrap gap-1 justify-center">{pz.map(z=><span key={z} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-1.5 py-0.5 rounded text-[9px] font-bold border border-red-200 dark:border-red-800">{z}</span>)}</div> : <span className="text-slate-300 dark:text-slate-500">-</span>}</td><td className="p-2 text-center font-bold text-blue-600 dark:text-blue-400">{t||'-'}</td></tr>)})}</tbody></table></div>
                            </div>
                            <button onClick={generateShareCard} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 shadow-lg"><Icon name="share"/> GERAR CARD (WHATSAPP)</button>
                        </div>
                    </div>

                    {/* HIDDEN EXPORT DOM ELEMENT */}
                    <div id={`export-card-${playerIndex}`} className="fixed z-[-1]" style={{left:'-9999px', top: '-9999px', width: '400px'}}>
                        <div className="bg-slate-900 p-6 rounded-3xl border-4 border-slate-700 text-white flex flex-col items-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-32 opacity-50" style={{background:`linear-gradient(to bottom, ${themeColor}, transparent)`}}></div>
                            <div className="w-32 h-32 rounded-full border-4 border-slate-800 bg-slate-800 shadow-2xl mb-4 overflow-hidden z-10 relative">
                                {player.image?<img src={player.image} className="w-full h-full object-cover object-top"/>:<div className="w-full h-full flex items-center justify-center text-slate-500"><Icon name="user" size={40}/></div>}
                            </div>
                            <h2 className="text-3xl font-black uppercase z-10 mb-1">{player.name}</h2>
                            <p className="text-slate-400 font-bold z-10 mb-6 tracking-widest">{player.number?`#${player.number} `:''} {player.position||'Atleta'}</p>
                            
                            <div className="w-full bg-slate-800 rounded-xl p-4 mb-4 border border-slate-700 flex justify-between items-center z-10 shadow-inner">
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Wellness Index</div>
                                    <div className={`text-3xl font-black ${wColor}`}>{totalW > 0 ? totalW : '-'}</div>
                                </div>
                                <div className="h-10 w-px bg-slate-700"></div>
                                <div className="text-center">
                                    <div className="text-[10px] text-slate-400 font-bold uppercase mb-1">Carga Hoje</div>
                                    <div className="text-3xl font-black text-blue-400">{(currentLog.rpe_am||0)+(currentLog.rpe_pm||0) || '-'}</div>
                                </div>
                            </div>
                            
                            <div className="w-full bg-slate-800 rounded-xl p-4 border border-slate-700 z-10">
                                <div className="flex items-center gap-2 mb-2 border-b border-slate-700 pb-2">
                                    <Icon name="brain" className="text-purple-400" size={16}/>
                                    <span className="text-[10px] font-bold text-purple-400 uppercase tracking-wider">Fisiologista Virtual</span>
                                </div>
                                <div className="text-sm text-slate-300 leading-snug">
                                    {totalW >= 25 ? "Alerta Crítico: Risco de Burnout ou Lesão." : totalW >= 18 ? "Atenção: Fadiga acumulada. Recuperação sugerida." : "Prontidão Alta: Atleta em boas condições."}
                                    {currentLog.painZones && currentLog.painZones.length > 0 && <span className="block mt-1 text-red-400 font-bold text-xs">Dores: {currentLog.painZones.join(', ')}</span>}
                                </div>
                            </div>
                            <div className="mt-4 text-[9px] text-slate-500 font-bold tracking-widest uppercase">Gerado por ProCoach Nuvem</div>
                        </div>
                    </div>
                </div>
            );
        };

        const MicrocycleView = ({ days, setDays, themeColor }) => {
            const [modalOpen, setModalOpen] = useState(false);
            const [aiModal, setAiModal] = useState(null); 
            const [activeSlot, setActiveSlot] = useState({ dayId: null, period: null }); 
            const safeDays = Array.isArray(days) ? days : [];
            const eventTypes = [ { label: 'JOGO', color: 'bg-[#dc2626]', text: 'text-white', load: 100 }, { label: 'TREINO', color: 'bg-[#16a34a]', text: 'text-white', load: 60 }, { label: 'RECUPERAÇÃO', color: 'bg-[#3b82f6]', text: 'text-white', load: 20 }, { label: 'ACADEMIA', color: 'bg-[#eab308]', text: 'text-white', load: 40 }, { label: 'FOLGA', color: 'bg-[#94a3b8]', text: 'text-white', load: 0 } ];
            
            const openModal = (dayId, period) => { setActiveSlot({ dayId, period }); setModalOpen(true); };
            const addEvent = (typeObj) => { const newDays = safeDays.map(d => { if(d.id === activeSlot.dayId) { const list = d[activeSlot.period] || []; const newEvent = { id: Date.now(), type: typeObj.label, colorClass: typeObj.color, textClass: typeObj.text, load: typeObj.load }; return { ...d, [activeSlot.period]: [...list, newEvent] }; } return d; }); setDays(newDays); setModalOpen(false); };
            const removeEvent = (dayId, period, eventId) => { const newDays = safeDays.map(d => { if(d.id === dayId) { return { ...d, [period]: (d[period] || []).filter(e => e.id !== eventId) }; } return d; }); setDays(newDays); };
            const updateHeader = (dayId, field, val) => { setDays(safeDays.map(d => d.id === dayId ? { ...d, [field]: val } : d)); };
            const exportAsImage = async () => { const element = document.getElementById('microcycle-container'); if(!element) return; try { const canvas = await html2canvas(element, { scale: 2, useCORS: true, scrollX: 0, scrollY: 0, windowWidth: document.documentElement.scrollWidth }); canvas.toBlob(blob => { smartShare(blob, 'microciclo_semana.png', 'Planejamento Semanal'); }); } catch(e) { showToast("Erro ao exportar"); } };

            const DayAnalysisModal = () => {
                if(!aiModal) return null; const md = aiModal.md || ""; let advice = "", focus = "";
                if(md.includes('MD-4')) { focus = "Aquisição (Força/Resistência)"; advice = "Dia longe do jogo. Ideal para cargas altas, treinos de força na academia ou resistência específica em campo. O volume pode ser elevado."; }
                else if(md.includes('MD-3')) { focus = "Específico (Tática/Intensidade)"; advice = "Dia de 'choque'. Intensidade deve ser alta (simil jogo), mas o volume total começa a ser controlado. Treinos reduzidos e intensos."; }
                else if(md.includes('MD-2')) { focus = "Velocidade / Polimento"; advice = "O Tapering (polimento) começa aqui. O volume deve cair drasticamente (-40%). Foco em reatividade, velocidade curta e ajustes táticos finos."; }
                else if(md.includes('MD-1')) { focus = "Ativação / Bola Parada"; advice = "Véspera de jogo. Carga mínima. Apenas ativação neural e ensaio de bolas paradas. Evite qualquer fadiga residual."; }
                else if(md === 'JOGO') { focus = "COMPETIÇÃO"; advice = "Dia do jogo. Foco total em hidratação, nutrição e estratégia pré-jogo. Ajuste o ciclo de sono e a última refeição."; }
                else if(md.includes('MD+1')) { focus = "Recuperação Passiva/Ativa"; advice = "Dia seguinte. Foco em remover metabólitos. Bicicleta, massagem, crioterapia ou folga total."; }
                else if(md.includes('MD+2')) { focus = "Retorno / Compensatório"; advice = "Quem jogou: transição. Quem não jogou: carga alta (compensatório) para igualar o nível físico do elenco."; }
                else { focus = "Dia Normal"; advice = "Sem designação MD específica. Mantenha o equilíbrio da carga."; }
                return (<div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 animate-fade-in" onClick={()=>setAiModal(null)}><div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 w-full max-w-sm relative overflow-hidden" onClick={e=>e.stopPropagation()}><div className="absolute top-0 left-0 w-full h-2 bg-green-600"></div><div className="flex flex-col items-center text-center gap-2 mb-4"><div className="bg-green-100 dark:bg-green-900/30 p-3 rounded-full text-green-700 dark:text-green-400"><Icon name="brain" size={32}/></div><h3 className="font-bold text-lg text-slate-800 dark:text-slate-100 uppercase">Análise {aiModal.name} <span className="text-green-600">({md})</span></h3></div><div className="bg-slate-50 dark:bg-slate-700 p-3 rounded-lg border border-slate-100 dark:border-slate-600 mb-4"><div className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase mb-1">Foco Sugerido</div><div className="text-sm font-black text-slate-800 dark:text-slate-200">{focus}</div></div><div className="text-sm text-slate-600 dark:text-slate-300 leading-relaxed mb-6">{advice}</div><button onClick={()=>setAiModal(null)} className="w-full bg-slate-800 dark:bg-slate-700 text-white font-bold py-3 rounded-lg hover:opacity-90">ENTENDIDO</button></div></div>);
            };

            const WeeklyCoach = () => {
                let totalLoad = 0; let hasGame = false; safeDays.forEach((d) => { [...(d.am||[]), ...(d.pm||[])].forEach(ev => { totalLoad += (ev.load || 0); if(ev.type === 'JOGO') hasGame = true; }); }); const intensityPct = Math.min(100, (totalLoad / 800) * 100); const barColor = intensityPct > 80 ? 'bg-red-500' : intensityPct > 50 ? 'bg-yellow-500' : 'bg-green-500';
                return (<div className="bg-white dark:bg-slate-800 p-3 mb-2 rounded-xl border-l-4 border-green-600 dark:border-green-500 shadow-sm flex items-center justify-between gap-4 mx-2"><div className="flex items-center gap-3"><div className="bg-green-100 dark:bg-green-900/30 p-2 rounded-full text-green-700 dark:text-green-400"><Icon name="info" size={20}/></div><div><h4 className="text-xs font-bold uppercase text-slate-500 dark:text-slate-400">Painel Tático IA</h4><p className="text-sm font-bold text-slate-800 dark:text-slate-200 leading-tight">{hasGame ? "Semana de Jogo. Atenção ao Tapering." : "Semana de Treinos. Foco no volume."}</p></div></div><div className="flex flex-col items-end min-w-[100px]"><span className="text-[9px] font-bold text-slate-400 uppercase mb-1">Vol. Semanal Est.</span><div className="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden"><div className={`h-full ${barColor}`} style={{width: `${intensityPct}%`}}></div></div></div></div>);
            };

            return (<div className="h-full bg-slate-200 dark:bg-slate-950 flex flex-col relative overflow-hidden animate-fade-in"><DayAnalysisModal /><div className="bg-white dark:bg-slate-800 p-4 border-b dark:border-slate-700 shadow-sm flex justify-between items-center shrink-0"><h2 className="font-bold text-lg flex gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="calendar"/> PLANEJAMENTO SEMANAL</h2><button onClick={exportAsImage} className="bg-slate-800 dark:bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-2 hover:opacity-90"><Icon name="share" size={14}/> PNG</button></div><div className="flex-1 overflow-x-auto overflow-y-hidden p-2 flex flex-col" id="microcycle-container"><WeeklyCoach /><div className="flex gap-2 h-full min-w-max pb-4">{safeDays.map(day => (<div key={day.id} className="w-40 flex flex-col bg-slate-100 dark:bg-slate-800/50 rounded-xl overflow-hidden shrink-0 h-full border border-slate-300 dark:border-slate-700 shadow-sm"><div className="micro-header p-1 text-center shrink-0 rounded-t-xl relative"><button onClick={()=>setAiModal(day)} className="absolute top-1 right-1 text-white/80 hover:text-white bg-white/20 rounded-full p-1"><Icon name="brain" size={12}/></button><BufferedInput className="bg-transparent text-center font-black text-sm w-full outline-none uppercase tracking-wide text-white mb-1" value={day.name} onSave={(val)=>updateHeader(day.id,'name',val)} /><div className="bg-white/10 rounded px-1 py-0.5 flex items-center justify-center gap-1"><select className="bg-transparent text-center text-[9px] text-white w-full outline-none font-bold uppercase cursor-pointer" value={day.md} onChange={(e)=>updateHeader(day.id,'md',e.target.value)}>{['MD-4','MD-3','MD-2','MD-1','JOGO','MD+1','MD+2'].map(o=><option key={o} value={o} className="text-black">{o}</option>)}</select></div></div><div className="flex-1 flex flex-col p-2 gap-2 overflow-y-auto">{['am','pm'].map(period => (<div key={period} className="flex-1 flex flex-col gap-0 relative"><div className="micro-header text-[8px] font-bold uppercase text-center py-0.5 rounded-t-md opacity-90">{period==='am'?'Manhã':'Tarde'}</div><div className="bg-white dark:bg-slate-800 flex-1 border border-t-0 border-slate-300 dark:border-slate-700 rounded-b-md p-1 flex flex-col gap-1 min-h-[80px] shadow-sm">{(day[period] || []).map(ev => (<div key={ev.id} className={`${ev.colorClass} ${ev.textClass} text-[9px] font-bold py-2 px-1 rounded shadow-sm text-center relative group/item tag-btn uppercase tracking-wider`}>{ev.type}<button onClick={()=>removeEvent(day.id, period, ev.id)} className="absolute top-0 right-0 text-white/70 hover:text-white hidden group-hover/item:block"><Icon name="x" size={10}/></button></div>))}<button onClick={()=>openModal(day.id, period)} className="mt-auto w-full dashed-btn flex items-center justify-center gap-1 uppercase tracking-wider" data-html2canvas-ignore="true">+ Add</button></div></div>))}</div></div>))}</div></div>{modalOpen && (<div className="absolute inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in" onClick={()=>setModalOpen(false)}><div className="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl p-6 w-full max-w-sm transform transition-all scale-100" onClick={e=>e.stopPropagation()}><h3 className="text-center font-bold text-slate-800 dark:text-slate-100 mb-4 text-lg">Adicionar Evento</h3><div className="space-y-2">{eventTypes.map(t => (<button key={t.label} onClick={()=>addEvent(t)} className={`w-full py-3 rounded-lg font-bold shadow-md ${t.color} ${t.text} tag-btn text-sm tracking-wide uppercase`}>{t.label}</button>))}</div><button onClick={()=>setModalOpen(false)} className="w-full mt-4 py-3 text-slate-400 dark:text-slate-500 font-bold text-xs hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">CANCELAR</button></div></div>)}</div>);
        };

        const WellnessView = ({ players, themeColor, trainingLog, setTrainingLog }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(0);
            const [wellnessDate, setWellnessDate] = useState(getTodayStr()); 
            const [localScores, setLocalScores] = useState({sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}); 
            const [localPainZones, setLocalPainZones] = useState([]);
            const [showImport, setShowImport] = useState(false);
            const bodyParts = ["Cabeça", "Pescoço", "Trapézio", "Ombro E", "Ombro D", "Peitoral", "Costas Sup.", "Lombar", "Abdômen", "Braço E", "Braço D", "Quadril", "Adutor", "Quadríceps", "Posterior Coxa", "Joelho", "Panturrilha", "Tornozelo", "Pé"];
            
            useEffect(() => { const log = trainingLog[wellnessDate]?.[selectedPlayer] || {}; setLocalScores(log.wellness || {sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}); setLocalPainZones(log.painZones || []); }, [wellnessDate, selectedPlayer, trainingLog]);
            const handleScoreChange = (metric, val) => { setLocalScores(prev => ({...prev, [metric]: parseInt(val)})); };
            const togglePainZone = (zone) => { let n = [...localPainZones]; if(n.includes(zone)) n = n.filter(z=>z!==zone); else n.push(zone); setLocalPainZones(n); };
            const confirmData = () => { const newLog = {...trainingLog}; if(!newLog[wellnessDate]) newLog[wellnessDate] = {}; if(!newLog[wellnessDate][selectedPlayer]) newLog[wellnessDate][selectedPlayer] = {}; newLog[wellnessDate][selectedPlayer].wellness = localScores; newLog[wellnessDate][selectedPlayer].painZones = localPainZones; setTrainingLog(newLog); showToast("Dados Salvos!"); };
            const resetAthleteDay = () => { if(!confirm(`Apagar dados?`)) return; const newLog = {...trainingLog}; if(newLog[wellnessDate] && newLog[wellnessDate][selectedPlayer]) { newLog[wellnessDate][selectedPlayer].wellness = {sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}; newLog[wellnessDate][selectedPlayer].painZones = []; setTrainingLog(newLog); setLocalScores({sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}); setLocalPainZones([]); showToast("Dados resetados."); } };
            const processImport = (text) => { try { const rows = text.trim().split('\n'); const newLog = {...trainingLog}; if (!newLog[wellnessDate]) newLog[wellnessDate] = {}; let count = 0; rows.forEach(row => { const cols = row.split('\t'); if (cols.length < 2) return; const name = cols[0].trim().toLowerCase(); const pIndex = players.findIndex(p => p.name.trim().toLowerCase() === name); if (pIndex !== -1) { if(!newLog[wellnessDate][pIndex]) newLog[wellnessDate][pIndex] = {}; const parseVal = (val, def=1) => { const n = parseInt(val); return isNaN(n) ? def : n; }; const w = { sleep: parseVal(cols[1]), stress: parseVal(cols[2]), fatigue: parseVal(cols[3]), soreness: parseVal(cols[4]), mood: parseVal(cols[5]) }; newLog[wellnessDate][pIndex].wellness = w; if(cols[6]) newLog[wellnessDate][pIndex].rpe_am = parseVal(cols[6], 0); if(cols[7]) newLog[wellnessDate][pIndex].rpe_pm = parseVal(cols[7], 0); count++; } }); setTrainingLog(newLog); setShowImport(false); const updatedLog = newLog[wellnessDate]?.[selectedPlayer] || {}; setLocalScores(updatedLog.wellness || {sleep:1,stress:1,fatigue:1,soreness:1, mood: 1}); showToast(`${count} atletas importados!`); } catch (e) { showToast("Erro ao processar."); } };
            
            const WellnessCoach = ({ scores }) => {
                const total = Object.values(scores).reduce((a,b)=>a+b,0);
                let msg = "", color = "";
                if(total >= 25) { msg = "Alerta Crítico: Risco de Burnout ou Lesão."; color = "bg-red-100 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-300"; }
                else if(total >= 18) { msg = "Atenção: Fadiga acumulada. Monitore."; color = "bg-yellow-100 text-yellow-800 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-300"; }
                else { msg = "Prontidão Alta: Atleta bem recuperado."; color = "bg-purple-100 text-purple-800 border-purple-200 dark:bg-purple-900/30 dark:text-purple-300"; }
                return (<div className={`mt-4 p-3 rounded-lg border border-l-4 flex items-center gap-3 ${color}`}><Icon name="brain" size={20}/><div className="text-xs font-bold">{msg}</div></div>);
            };

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto flex flex-col gap-6 animate-fade-in">
                    <ImportModal show={showImport} onClose={()=>setShowImport(false)} onImport={processImport} />
                    <div className="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-lg border-2 border-slate-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4"><div><h2 className="text-lg font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="smile"/> WELLNESS DIÁRIO</h2><p className="text-xs text-slate-400 dark:text-slate-500">Data: <span className="font-bold">{wellnessDate}</span></p></div><div className="flex gap-2"><button onClick={()=>setShowImport(true)} className="bg-green-600 text-white px-3 py-1.5 rounded text-xs font-bold flex items-center gap-2 hover:bg-green-700"><Icon name="paste" size={14}/> IMPORTAR</button><input type="date" value={wellnessDate} onChange={e=>setWellnessDate(e.target.value)} className="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold text-lg rounded px-3 py-1 outline-none border border-slate-200 dark:border-slate-600 cursor-pointer"/></div></div>
                    <div className="flex flex-col md:flex-row gap-6 flex-1">
                        <div className="w-full md:w-1/3 bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-200 dark:border-slate-700 flex flex-col"><h3 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-4">Selecionar Atleta</h3><div className="space-y-2 flex-1 overflow-y-auto pr-2">{players.map((p, i) => (<div key={i} onClick={()=>setSelectedPlayer(i)} className={`flex items-center gap-2 p-2 rounded cursor-pointer border group transition-colors ${selectedPlayer===i?'border-l-4 shadow-sm':'border-transparent hover:bg-slate-50 dark:hover:bg-slate-700'}`} style={{borderLeftColor: selectedPlayer===i?themeColor:'transparent'}}><div className="w-10 h-10 rounded-full bg-slate-200 overflow-hidden relative shrink-0 border border-slate-200 dark:border-slate-600">{p.image?<img src={p.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div><div className="font-bold text-sm text-slate-700 dark:text-slate-200">{p.name}</div></div>))}</div></div>
                        <div className="flex-1 bg-white dark:bg-slate-800 rounded-xl shadow p-6 border border-slate-200 dark:border-slate-700 flex flex-col gap-4 overflow-y-auto relative">
                            <div className="flex justify-between items-center border-b dark:border-slate-700 pb-4"><div><h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100">{players[selectedPlayer]?.name}</h2></div><div className="text-center"><div className={`text-4xl font-black ${Object.values(localScores).reduce((a,b)=>a+b,0)>=25?'text-red-500':'text-green-500'}`}>{Object.values(localScores).reduce((a,b)=>a+b,0)}</div><div className="text-[9px] uppercase font-bold text-slate-400">Wellness Index</div></div></div>
                            <div className="space-y-4">{[{id:'sleep',label:'Qualidade do Sono (1-7)'},{id:'stress',label:'Estresse (1-7)'},{id:'fatigue',label:'Fadiga (1-7)'},{id:'soreness',label:'Dor Muscular (1-7)'}, {id:'mood', label:'Humor (1-7)'}].map(m=>(<div key={m.id}><div className="flex justify-between text-sm font-bold text-slate-700 dark:text-slate-300 mb-2"><span>{m.label}</span><span className="text-white px-2 rounded font-bold" style={{backgroundColor: themeColor}}>{localScores[m.id]}</span></div><input type="range" min="1" max="7" step="1" value={localScores[m.id]} onChange={(e)=>handleScoreChange(m.id, e.target.value)} className="hooper-slider" style={{accentColor: themeColor}}/></div>))}</div>
                            <WellnessCoach scores={localScores} />
                            <div className="border-t dark:border-slate-700 pt-4"><h4 className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Local da Dor</h4><select className="w-full p-2 border dark:border-slate-600 rounded text-xs mb-2 bg-white dark:bg-slate-700 dark:text-white" onChange={(e)=>{if(e.target.value) togglePainZone(e.target.value); e.target.value='';}}><option value="">+ Adicionar Local</option>{bodyParts.map(p=><option key={p} value={p}>{p}</option>)}</select><div className="flex flex-wrap gap-1">{localPainZones.map(z=><span key={z} onClick={()=>togglePainZone(z)} className="bg-red-100 dark:bg-red-900/50 text-red-600 dark:text-red-400 px-2 py-1 rounded text-xs font-bold cursor-pointer hover:bg-red-200 dark:hover:bg-red-800">{z} ×</span>)}</div></div>
                            <div className="flex gap-2 mt-4"><button onClick={resetAthleteDay} className="flex-1 py-4 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 font-bold rounded-xl hover:bg-red-50 hover:text-red-500 dark:hover:bg-red-900/30 text-xs flex items-center justify-center gap-2"><Icon name="trash"/> LIMPAR</button><button onClick={confirmData} className="flex-[3] py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg hover:opacity-90 flex items-center justify-center gap-2"><Icon name="save"/> SALVAR DADOS</button></div>
                        </div>
                    </div>
                </div>
            );
        };

        const MedicalView = ({ players, setPlayers, dmRecords, setDmRecords, themeColor }) => {
            const [selectedPlayer, setSelectedPlayer] = useState('');
            const [injuryType, setInjuryType] = useState('Muscular');
            const [location, setLocation] = useState('');
            const [dateIn, setDateIn] = useState(getTodayStr());
            const [editingId, setEditingId] = useState(null); 
            const records = Array.isArray(dmRecords) ? dmRecords : [];
            const activeInjuries = records.filter(r => r.status === 'Active');
            const commonDiagnoses = [ "Estiramento Posterior Coxa", "Estiramento Quadríceps", "Estiramento Adutor", "Estiramento Panturrilha", "Entorse Tornozelo", "Entorse Joelho", "Trauma Direto (Pancada)", "Edema Muscular", "Tendinite Patelar", "Tendinite Aquiles", "Pubalgia", "Contratura Muscular", "Fratura", "Luxação Ombro", "Desconforto Muscular", "Gripe / Virose", "Outro" ];
            
            const handleSave = () => { if(!selectedPlayer) return alert('Selecione um atleta'); if (editingId) { const updated = records.map(r => r.id === editingId ? { ...r, playerId: selectedPlayer, type: injuryType, location, dateIn } : r); setDmRecords(updated); setEditingId(null); showToast('Registro atualizado'); } else { const newRecord = { id: Date.now(), playerId: selectedPlayer, type: injuryType, location, dateIn, dateOut: null, status: 'Active', rtpPhase: 1 }; setDmRecords([newRecord, ...records]); const updatedPlayers = [...players]; updatedPlayers[selectedPlayer].injured = true; setPlayers(updatedPlayers); showToast('Atleta no DM'); } setLocation(''); if (!editingId) setSelectedPlayer(''); };
            const handleEdit = (record) => { setEditingId(record.id); setSelectedPlayer(record.playerId); setInjuryType(record.type); setLocation(record.location); setDateIn(record.dateIn); };
            const handleDelete = (id, playerId, status) => { if(!confirm('Excluir?')) return; const newRecords = records.filter(r => r.id !== id); setDmRecords(newRecords); if (status === 'Active') { const hasOtherActive = newRecords.some(r => r.playerId == playerId && r.status === 'Active'); if (!hasOtherActive) { const updatedPlayers = [...players]; updatedPlayers[playerId].injured = false; setPlayers(updatedPlayers); } } showToast('Excluído'); };
            const dischargePlayer = (recordId, playerId) => { if(!confirm('Dar alta?')) return; const updatedRecords = records.map(r => r.id === recordId ? { ...r, status: 'Recovered', dateOut: getTodayStr() } : r); setDmRecords(updatedRecords); const updatedPlayers = [...players]; updatedPlayers[playerId].injured = false; setPlayers(updatedPlayers); showToast('Atleta liberado!'); };
            
            const DrAI = ({ phaseId }) => { 
                const pid = parseInt(phaseId) || 1; let advice = "";
                if(pid <= 2) advice = "Foco: Analgesia e reparo tecidual. Controle de inflamação antes da mobilidade.";
                else if(pid <= 4) advice = "Foco: Iniciar arco de movimento e força isométrica.";
                else if(pid <= 6) advice = "Foco: Retorno ao campo, trotes lineares e propriocepção dinâmica.";
                else if(pid <= 8) advice = "Foco: Treino com bola, reações rápidas e integração progressiva ao grupo.";
                else advice = "Foco: Apto para jogo. Controle de minutagem inicial sugerido.";
                return (
                    <div className="mt-2 flex gap-2 items-center bg-blue-50 dark:bg-blue-900/30 p-2 rounded text-[10px] text-blue-800 dark:text-blue-300">
                        <Icon name="brain" size={14}/><span><strong>Dr. Virtual:</strong> {advice}</span>
                    </div>
                ); 
            };
            
            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in flex flex-col gap-6">
                    <div className="flex flex-col md:flex-row gap-6">
                        <div className="w-full md:w-1/3 bg-white dark:bg-slate-800 rounded-xl shadow p-6 border border-slate-200 dark:border-slate-700">
                            <h2 className="text-xl font-bold flex items-center gap-2 mb-4 text-red-600 dark:text-red-500"><Icon name="medkit"/> {editingId ? 'Editar' : 'Entrada DM'}</h2>
                            <div className="flex justify-center mb-4"><div className="w-24 h-24 rounded-full bg-slate-100 overflow-hidden relative shadow-sm">{selectedPlayer!==''&&players[selectedPlayer]?.image?<img src={players[selectedPlayer].image} className="w-full h-full object-cover object-top"/>:<div className="w-full h-full flex items-center justify-center text-slate-300"><Icon name="user" size={40}/></div>}</div></div>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Atleta</label>
                            <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 font-bold text-sm dark:bg-slate-700 dark:text-white" value={selectedPlayer} onChange={e=>setSelectedPlayer(e.target.value)} disabled={!!editingId}><option value="">Selecione...</option>{players.map((p,i)=><option key={i} value={i}>{p.name}</option>)}</select>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Tipo</label>
                            <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 text-sm dark:bg-slate-700 dark:text-white" value={injuryType} onChange={e=>setInjuryType(e.target.value)}><option>Muscular</option><option>Articular</option><option>Trauma/Pancada</option><option>Fratura</option><option>Doença</option><option>Outro</option></select>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Diagnóstico</label>
                            <select className="w-full border dark:border-slate-600 rounded p-2 mb-3 text-sm dark:bg-slate-700 dark:text-white" value={location} onChange={e=>setLocation(e.target.value)}><option value="">Selecione...</option>{commonDiagnoses.map(d=><option key={d} value={d}>{d}</option>)}</select>
                            <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mt-2 block">Data Entrada</label>
                            <input type="date" className="w-full border dark:border-slate-600 rounded p-2 mb-4 text-sm dark:bg-slate-700 dark:text-white" value={dateIn} onChange={e=>setDateIn(e.target.value)}/>
                            <div className="flex gap-2"><button onClick={handleSave} className="flex-1 bg-red-600 text-white font-bold py-3 rounded hover:bg-red-700">SALVAR</button></div>
                        </div>
                        <div className="flex-1 space-y-4">
                            <div className="bg-white dark:bg-slate-800 rounded-xl shadow border border-slate-200 dark:border-slate-700 p-4">
                                <div className="flex justify-between items-center mb-4"><h3 className="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase flex items-center gap-2"><Icon name="activity"/> Tratamento (Ativos)</h3></div>
                                {activeInjuries.length===0?<div className="text-slate-400 text-sm text-center py-4">Nenhum atleta no DM.</div>:<div className="space-y-3">{activeInjuries.map((r,idx)=>{
                                    const progressPct=((r.rtpPhase||1)/9)*100;
                                    return(
                                        <div key={idx} className="p-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg shadow-sm mb-2 relative">
                                            <div className="flex justify-between items-start mb-2">
                                                <div className="flex gap-3">
                                                    <div className="w-12 h-12 rounded-full bg-slate-100 overflow-hidden border border-red-200">{players[r.playerId]?.image?<img src={players[r.playerId].image} className="w-full h-full object-cover object-top"/>:<Icon name="user" className="m-3 text-red-300"/>}</div>
                                                    <div>
                                                        <div className="font-bold text-slate-800 dark:text-slate-100 text-lg">{players[r.playerId]?.name}</div>
                                                        <div className="text-xs text-red-600 font-bold">{r.location}</div>
                                                    </div>

        const AssessmentView = ({ players, themeColor, assessments, setAssessments }) => {
            const [selectedPlayer, setSelectedPlayer] = useState(0);

            const [form, setForm] = useState({ date: getTodayStr(), weight: '', height: '', age: '', chest: '', axilla: '', tricep: '', subscap: '', abdo: '', supra: '', thigh: '', soccer_test: '', sj: '', cmj: '', speed30: '' });
            const calculateBF = () => { const sum = Number(form.chest)+Number(form.axilla)+Number(form.tricep)+Number(form.subscap)+Number(form.abdo)+Number(form.supra)+Number(form.thigh); if(sum===0||!form.age) return 0; const bd = 1.112 - (0.00043499*sum) + (0.00000055*sum*sum) - (0.00028826*form.age); return (((4.95/bd)-4.50)*100).toFixed(1); };
            const saveAssessment = () => { const newRec = { ...form, bf: calculateBF() }; const h = assessments[selectedPlayer] || []; setAssessments({ ...assessments, [selectedPlayer]: [newRec, ...h] }); showToast("Avaliação Salva!"); };
            const getRankings = (metric) => { const list = players.map((p, i) => { const h = assessments[i] || []; const val = h.length > 0 ? parseFloat(h[0][metric]) : 0; return { name: p.name, val: isNaN(val) ? 0 : val }; }).filter(x => x.val > 0); if(metric === 'speed30') { list.sort((a,b) => a.val - b.val); } else { list.sort((a,b) => b.val - a.val); } return { top5: list.slice(0, 5), bottom5: list.slice(-5).reverse() }; };
            const rankings = getRankings(viewMetric);

ype="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="border dark:border-slate-600 rounded px-2 py-1 text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-700"/></div></div><div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"><div><label className="text-[10px] font-bold text-slate-400 uppercase">Peso (kg)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white" value={form.weight} onChange={e=>setForm({...form, weight: e.target.value})}/></div><div><label className="text-[10px] font-bold text-slate-400 uppercase">Altura (cm)</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white" value={form.height} onChange={e=>setForm({...form, height: e.target.value})}/></div><div><label className="text-[10px] font-bold text-slate-400 uppercase">Idade</label><input type="number" className="w-full border dark:border-slate-600 rounded p-2 text-sm font-bold dark:bg-slate-700 dark:text-white" value={form.age} onChange={e=>setForm({...form, age: e.target.value})}/></div><div className="bg-slate-100 dark:bg-slate-700 rounded p-2 flex flex-col items-center justify-center"><span className="text-[10px] font-bold text-slate-400 uppercase">Gordura Est.</span><span className="text-xl font-black text-slate-700 dark:text-slate-200">{calculateBF()}%</span></div></div><h3 className="text-xs font-bold text-slate-500 uppercase mb-2 border-b dark:border-slate-700 pb-1">Dobras (mm) & Testes</h3><div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">{[['chest','Peitoral'],['abdo','Abdominal'],['thigh','Coxa'],['soccer_test','Soccer Test'],['sj','Squat Jump'],['cmj','CMJ'],['speed30','Velocidade 30m']].map(([k,l]) => (<div key={k}><label className="text-[9px] font-bold text-slate-400 uppercase">{l}</label><input type="number" className="w-full border dark:border-slate-600 rounded p-1.5 text-sm dark:bg-slate-700 dark:text-white" value={form[k]} onChange={e=>setForm({...form, [k]: e.target.value})}/></div>))}</div><PhysicalAnalyst /><button onClick={saveAssessment} className="w-full py-3 bg-slate-800 dark:bg-slate-700 text-white font-bold rounded-lg hover:opacity-90 flex items-center justify-center gap-2 mt-4"><Icon name="save"/> SALVAR AVALIAÇÃO</button><div className="mt-6"><h3 className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Histórico</h3><div className="overflow-x-auto"><table className="w-full text-xs text-left"><thead className="bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300"><tr><th className="p-2">Data</th><th className="p-2">% Gord</th><th className="p-2">Soccer</th><th className="p-2">SJ</th><th className="p-2">CMJ</th><th className="p-2">30m</th></tr></thead><tbody>{history.map((h, i) => (<tr key={i} className="border-t dark:border-slate-600"><td className="p-2 dark:text-slate-300">{formatDateBR(h.date)}</td><td className="p-2 font-bold text-blue-600 dark:text-blue-400">{h.bf}%</td><td className="p-2 dark:text-slate-300">{h.soccer_test}</td><td className="p-2 dark:text-slate-300">{h.sj}</td><td className="p-2 dark:text-slate-300">{h.cmj}</td><td className="p-2 dark:text-slate-300">{h.speed30}</td></tr>))}</tbody></table></div></div></div><div className="w-full lg:w-64 bg-white dark:bg-slate-800 rounded-xl shadow p-4 border border-slate-200 dark:border-slate-700"><h3 className="text-sm font-bold text-slate-800 dark:text-slate-100 uppercase mb-4 flex items-center gap-2"><Icon name="trophy"/> Rankings</h3><select className="w-full mb-4 text-xs font-bold border dark:border-slate-600 rounded p-2 dark:bg-slate-700 dark:text-white" value={viewMetric} onChange={e=>setViewMetric(e.target.value)}><option value="soccer_test">Soccer Test</option><option value="sj">Squat Jump</option><option value="cmj">CMJ</option><option value="speed30">Velocidade 30m</option></select><RankChart title="Melhores" data={rankings.top5} color="#22c55e" /><div className="border-t dark:border-slate-700 my-2"></div><RankChart title="Abaixo" data={rankings.bottom5} color="#ef4444" /></div></div></div>);
        };

        const SquadView = ({ players, setPlayers, themeColor, trainingLog, dmRecords }) => {
            const [viewProfile, setViewProfile] = useState(null);
            const [editPlayer, setEditPlayer] = useState(null); 
            const today = getTodayStr(); 
            const addP = () => setPlayers([...players, {name: "Novo Atleta", image: null, injured: false, position: 'Atleta', number: ''}]);
            const fileInputRef = useRef(null); const [localData, setLocalData] = useState({});
            const getWeeklyLoad = (playerIndex) => { const dates = getDatesInRange(today, 7); let sum = 0; dates.forEach(d => { const log = trainingLog[d]?.[playerIndex]; if(log) sum += (log.rpe_am || 0) + (log.rpe_pm || 0); }); return sum; };
            const getPlayerDMStatus = (playerId) => { if(!dmRecords) return null; return dmRecords.find(r => r.playerId == playerId && r.status === 'Active'); };
            const Editor = () => { if(editPlayer === null) return null; const p = players[editPlayer]; const handleImg = async (e) => { const f=e.target.files[0]; if(f){ try{const c=await compressImage(f,80,0.4); setLocalData({...localData, image:c});}catch(e){} } }; return (<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={()=>setEditPlayer(null)}><div className="bg-white dark:bg-slate-800 rounded-xl p-4 w-full max-w-sm space-y-3" onClick={e=>e.stopPropagation()}><h3 className="font-bold dark:text-white">Editar {p.name}</h3><div className="flex justify-center flex-col items-center gap-2"><div onClick={()=>fileInputRef.current.click()} className="w-32 h-32 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden border-2 border-blue-500 cursor-pointer">{localData.image?<img src={localData.image} className="w-full h-full object-cover object-top"/>:<Icon name="user"/>}</div><input type="file" ref={fileInputRef} className="hidden" onChange={handleImg}/><div className="w-full"><label className="text-[9px] uppercase font-bold text-slate-400">Ou cole URL da Imagem:</label><BufferedInput className="w-full text-xs border dark:border-slate-600 rounded p-1 dark:bg-slate-700 dark:text-white" placeholder="https://..." value={localData.image && localData.image.startsWith('http') ? localData.image : ''} onSave={(val)=>setLocalData({...localData, image:val})} /></div></div><BufferedInput className="w-full border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" value={localData.name} onSave={val=>setLocalData({...localData, name:val})}/><div className="grid grid-cols-2 gap-2"><BufferedInput type="number" className="border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" placeholder="Camisa" value={localData.number} onSave={val=>setLocalData({...localData, number:val})}/><select className="border dark:border-slate-600 p-2 rounded dark:bg-slate-700 dark:text-white" value={localData.position} onChange={e=>setLocalData({...localData, position:e.target.value})}><option value="">-</option>{["Goleiro","Zagueiro","Lateral","Volante","Meia","Ponta","Atacante"].map(x=><option key={x} value={x}>{x}</option>)}</select></div><div className="flex gap-2"><button onClick={()=>{if(confirm('Excluir?')){setPlayers(players.filter((_,i)=>i!==editPlayer));setEditPlayer(null);}}} className="bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 p-2 rounded flex-1">Excluir</button><button onClick={()=>{const n=[...players];n[editPlayer]=localData;setPlayers(n);setEditPlayer(null);}} className="bg-blue-600 text-white p-2 rounded flex-1">Salvar</button></div></div></div>); };
            
            const injuredCount = players.filter(p=>p.injured).length;
            const squadAnalysis = injuredCount > 2 ? `Atenção: ${injuredCount} atletas indisponíveis.` : "Elenco com boa disponibilidade geral.";

            return (
                <div className="p-6 bg-slate-50 dark:bg-slate-900 h-full overflow-y-auto animate-fade-in">
                    <PlayerProfileModal player={players[viewProfile]} playerIndex={viewProfile} logs={trainingLog} onClose={()=>setViewProfile(null)} themeColor={themeColor} setPlayers={setPlayers} players={players} />
                    {editPlayer!==null && <Editor/>}
                    
                    <div className="flex justify-between items-end mb-6">
                        <h2 className="text-2xl font-bold flex items-center gap-2 dark:text-slate-100" style={{color: themeColor}}><Icon name="user"/> Gestão do Elenco</h2>
                        <div className="text-xs bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-2 text-slate-600 dark:text-slate-300">
                            <Icon name="brain" size={14} className="text-blue-500"/>
                            {squadAnalysis}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">{players.map((p, i) => { const load = getWeeklyLoad(i); const dailyLog = trainingLog[today]?.[i] || {}; const wellness = dailyLog.wellness || {}; const soreness = wellness.soreness || 0; const sleep = wellness.sleep || 0; const isRisk = soreness >= 5; const dmStatus = p.injured ? getPlayerDMStatus(i) : null; return (<div key={i} className={`bg-white dark:bg-slate-800 rounded-xl shadow border p-4 flex flex-col items-center gap-3 relative group hover:shadow-lg transition-all cursor-pointer ${isRisk || p.injured ? 'border-red-500 dark:border-red-500 ring-2 ring-red-100 dark:ring-red-900/50' : 'border-slate-100 dark:border-slate-700'}`} onClick={()=>setViewProfile(i)}><button onClick={(e)=>{e.stopPropagation();setLocalData(p);setEditPlayer(i);}} className="absolute top-2 right-2 text-slate-300 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 bg-white dark:bg-slate-800 rounded-full p-1"><Icon name="edit" size={16}/></button>{isRisk && !p.injured && <div className="absolute top-2 left-2 bg-red-500 text-white text-[9px] font-bold px-2 py-0.5 rounded-full animate-pulse z-10 flex items-center gap-1"><Icon name="alert" size={10} stroke="white"/> RISCO</div>}{p.injured && <div className="absolute top-2 left-2 bg-slate-800 dark:bg-slate-600 text-white p-1.5 rounded-full z-10"><Icon name="medkit" size={14}/></div>}<div className="w-20 h-20 rounded-full bg-slate-100 dark:bg-slate-700 overflow-hidden relative border-2 shrink-0" style={{borderColor: p.injured ? '#1e293b' : isRisk ? '#ef4444' : themeColor}}>{p.image ? <img src={p.image} className="w-full h-full object-cover object-top"/> : <div className="w-full h-full flex items-center justify-center text-slate-300 dark:text-slate-500"><Icon name="user" size={32}/></div>}</div><div className="text-center w-full"><div className="font-bold text-slate-700 dark:text-slate-200 text-lg truncate">{p.name}</div><div className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase mt-1 flex justify-center gap-2">{p.number && <span className="bg-slate-100 dark:bg-slate-700 px-1.5 rounded text-slate-600 dark:text-slate-300">#{p.number}</span>}<span>{p.position || 'Atleta'}</span></div></div><div className="border-t dark:border-slate-700 pt-2 w-full flex justify-center items-center gap-2">{p.injured && dmStatus ? (<div className="w-full text-center"><div className="text-[10px] font-black text-red-600 dark:text-red-400 uppercase mb-1">{dmStatus.location}</div><div className="text-[9px] font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 rounded px-2 py-1">{RTP_PHASES.find(ph=>ph.id==dmStatus.rtpPhase)?.label || 'Em tratamento'}</div></div>) : (<><MiniGauge value={load} min={0} max={100} label="Carga 7 Dias" />{sleep > 0 && sleep <= 2 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Sono Ruim"><Icon name="moon" size={12}/></div>}{soreness >= 5 && <div className="text-red-500 bg-red-50 dark:bg-red-900/30 p-1 rounded-full" title="Dor Alta"><Icon name="bolt" size={12}/></div>}</>)}</div></div>) })}<button onClick={addP} className="bg-white dark:bg-slate-800 rounded-xl shadow border border-dashed border-slate-300 dark:border-slate-600 p-4 flex flex-col items-center justify-center gap-2 text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 hover:border-blue-500 dark:hover:border-blue-400 transition-all cursor-pointer h-40"><Icon name="plus" size={32}/><span className="font-bold text-sm">Adicionar Atleta</span></button></div>
                </div>

        const LoadAdvisor = ({ playerIndex, date, trainingLog }) => {
            const getLoad = (d) => { const l = trainingLog[d]?.[playerIndex]; return l ? (l.rpe_am||0)+(l.rpe_pm||0) : 0; };
            const todayLoad = getLoad(date);
            const historyDates = getDatesInRange(date, 7).slice(1); 
            let chronicLoad = 0; historyDates.forEach(d => chronicLoad += getLoad(d)); const avgLoad = (chronicLoad + todayLoad) / 7;
            let tmrMsg = "Manter planejamento."; let color = "bg-green-100 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800";
            if (avgLoad > 0) {
                if (todayLoad > avgLoad * 1.4) { tmrMsg = "Sugestão p/ amanhã: Recuperativo"; color = "bg-red-100 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800"; } 
                else if (todayLoad < avgLoad * 0.6) { tmrMsg = "Sugestão: Treino de Força"; color = "bg-yellow-100 text-yellow-700 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-400 dark:border-yellow-800"; }
